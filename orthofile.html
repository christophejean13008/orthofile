<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon correcteur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f8f9fa;min-height:100vh;padding:1rem}
.app{max-width:680px;margin:0 auto;padding:1rem 0}
h1{font-size:22px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:4px;font-family:'Baloo 2',sans-serif}
.sub{font-size:14px;color:#666;text-align:center;margin-bottom:1rem}
.level-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.level-row span{font-size:12px;color:#888}
.lvl{padding:5px 14px;font-size:13px;font-weight:600;border:1.5px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;color:#666;font-family:'Nunito',sans-serif}
.lvl.active{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
textarea{width:100%;min-height:120px;padding:12px;font-size:15px;line-height:1.7;border:1.5px solid #ccc;border-radius:12px;resize:vertical;font-family:'Nunito',sans-serif;color:#1a1a1a;background:#fff}
textarea:focus{outline:none;border-color:#378ADD}
.btn-go{background:#3B6D11;border:none;color:#fff;font-size:16px;font-weight:700;padding:12px 24px;margin-top:10px;width:100%;cursor:pointer;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Baloo 2',sans-serif;transition:background .15s}
.btn-go:hover{background:#27500A}
.btn-go:disabled{background:#aaa;cursor:not-allowed}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.correction{display:none}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.progress-track{flex:1;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:#639922;border-radius:4px;transition:width 0.4s}
.progress-count{font-size:13px;font-weight:700;color:#1a1a1a;white-space:nowrap}

.phrase-ctx{font-size:17px;line-height:3.2;padding:18px 18px 14px;background:#f4f4f4;font-family:'Nunito',sans-serif;color:#1a1a1a}
.ctx-grey{color:#999}
.trou-wrap{display:inline-flex;flex-direction:column;align-items:stretch;vertical-align:middle;margin:0 4px;gap:6px}

.trou-btn{padding:7px 18px;font-size:17px;font-weight:700;border:2.5px solid;border-radius:10px;cursor:pointer;font-family:'Baloo 2',sans-serif;white-space:nowrap;transition:all .15s;line-height:1.3;text-align:center;min-width:80px}
.trou-btn:active{transform:scale(0.97)}
.btn-TYPOS{background:#E1F5EE;border-color:#5DCAA5;color:#085041}.btn-TYPOS:hover{background:#9FE1CB}
.btn-GRAMMAR{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}.btn-GRAMMAR:hover{background:#B5D4F4}
.btn-STYLE{background:#EEEDFE;border-color:#AFA9EC;color:#26215C}.btn-STYLE:hover{background:#CECBF6}
.btn-OTHER{background:#FAEEDA;border-color:#EF9F27;color:#412402}.btn-OTHER:hover{background:#FAC775}
.trou-btn.ok{background:#EAF3DE;border-color:#3B6D11;color:#173404;pointer-events:none}
.trou-btn.ko{background:#FCEBEB;border-color:#A32D2D;color:#501313;pointer-events:none}
.trou-btn.grise{opacity:.35;pointer-events:none}

.libre-row{display:flex;gap:5px;align-items:center}
.saisie-libre{font-size:16px;font-weight:700;font-family:'Baloo 2',sans-serif;padding:6px 10px;border:2.5px solid #AFA9EC;border-radius:10px;width:130px;background:#fff;color:#1a1a1a;text-align:center}
.saisie-libre:focus{outline:none;border-color:#7F77DD}
.btn-valider{background:#EEEDFE;border:2.5px solid #AFA9EC;color:#26215C;font-size:13px;font-weight:700;font-family:'Baloo 2',sans-serif;padding:6px 12px;border-radius:10px;cursor:pointer}
.btn-valider:hover{background:#CECBF6}

.btn-jnsp{background:#fff;border:2px dashed #ccc;color:#888;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;padding:6px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}
.btn-jnsp:hover{background:#f0f0f0}

.mot-jnsp{color:#bbb;font-weight:700;font-style:italic;background:#f0f0f0;padding:2px 8px;border-radius:6px;border:2px dashed #ddd}

.erreur-card{border-radius:16px;overflow:hidden;margin-bottom:1rem;border:2px solid}
.card-TYPOS{border-color:#5DCAA5}.card-GRAMMAR{border-color:#85B7EB}.card-STYLE{border-color:#AFA9EC}.card-OTHER{border-color:#EF9F27}
.card-header{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.header-TYPOS{background:#E1F5EE}.header-GRAMMAR{background:#E6F1FB}.header-STYLE{background:#EEEDFE}.header-OTHER{background:#FAEEDA}
.badge{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;font-family:'Baloo 2',sans-serif}
.badge-TYPOS{background:#5DCAA5;color:#04342C}.badge-GRAMMAR{background:#85B7EB;color:#042C53}.badge-STYLE{background:#AFA9EC;color:#26215C}.badge-OTHER{background:#EF9F27;color:#412402}
.num-badge{font-size:12px;color:#888;font-weight:600}

.lecon-zone{padding:16px 18px;border-bottom:1.5px solid #AFA9EC;background:#EEEDFE;border-top:1.5px solid #AFA9EC}
.lecon-titre{font-size:11px;font-weight:700;color:#534AB7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:'Baloo 2',sans-serif;display:flex;align-items:center;gap:6px}
.lecon-texte{font-size:15px;line-height:1.75;color:#26215C;font-weight:600}

.feedback-zone{padding:14px 18px;display:none;border-top:1.5px solid #ddd}
.feedback-zone.show{display:block}
.feedback-zone.good{background:#EAF3DE}.feedback-zone.bad{background:#FCEBEB}.feedback-zone.skip{background:#f4f4f4}
.feedback-texte{font-size:15px;line-height:1.6;font-weight:600}
.feedback-texte.good{color:#173404}.feedback-texte.bad{color:#501313}.feedback-texte.skip{color:#666}

.nav-zone{padding:14px 18px;display:none;border-top:1.5px solid #ddd;background:#f4f4f4}
.nav-zone.show{display:flex;justify-content:flex-end}
.btn-suiv{padding:11px 26px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#3B6D11;color:#fff;display:inline-flex;align-items:center;gap:8px;font-family:'Baloo 2',sans-serif}
.btn-suiv:hover{background:#27500A}

.fin-card{background:#EAF3DE;border-radius:16px;padding:2.5rem;text-align:center;display:none;border:2px solid #97C459}
.fin-card.show{display:block}
.fin-score{font-size:56px;font-weight:700;color:#27500A;font-family:'Baloo 2',sans-serif}
.fin-label{font-size:16px;color:#3B6D11;margin:8px 0 1.5rem;font-weight:600}
.btn-rec{padding:11px 26px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#3B6D11;color:#fff;display:inline-flex;align-items:center;gap:8px;font-family:'Baloo 2',sans-serif}
.btn-rec:hover{background:#27500A}
.ok-box{background:#EAF3DE;border-radius:16px;padding:2rem;text-align:center;border:2px solid #97C459}
</style>
</head>
<body>
<div class="app">
  <div id="saisie">
    <h1>✏️ Mon correcteur</h1>
    <p class="sub">Écris ton texte — je t'aide à te corriger toi-même !</p>
    <div class="level-row">
      <span>Niveau :</span>
      <button class="lvl active" onclick="setLevel('cp')" id="l-cp">CP</button>
      <button class="lvl" onclick="setLevel('ce1')" id="l-ce1">CE1</button>
      <button class="lvl" onclick="setLevel('ce2')" id="l-ce2">CE2</button>
      <button class="lvl" onclick="setLevel('cm')" id="l-cm">CM1-CM2</button>
    </div>
    <textarea id="txt" placeholder="Écris ton texte ici…&#10;Exemple : je vé au chant cueillir des pommr."></textarea>
    <button class="btn-go" id="btnGo" onclick="lancer()">🔍 Vérifier mon texte</button>
  </div>
  <div class="correction" id="correction"></div>
</div>

<script>
let level='cp', errors=[], idx=0, correct=0, answered=[], originalText='';

function setLevel(l){
  level=l;
  ['cp','ce1','ce2','cm'].forEach(x=>document.getElementById('l-'+x).classList.toggle('active',x===l));
}

const STYLES={
  TYPOS  :{card:'card-TYPOS',  header:'header-TYPOS',  btn:'btn-TYPOS',  badge:'badge-TYPOS',  label:'Orthographe'},
  GRAMMAR:{card:'card-GRAMMAR',header:'header-GRAMMAR',btn:'btn-GRAMMAR',badge:'badge-GRAMMAR',label:'Grammaire'},
  STYLE  :{card:'card-STYLE',  header:'header-STYLE',  btn:'btn-STYLE',  badge:'badge-STYLE',  label:'Style'},
  OTHER  :{card:'card-OTHER',  header:'header-OTHER',  btn:'btn-OTHER',  badge:'badge-OTHER',  label:'Autre'},
};
function sFor(cat){return STYLES[cat]||STYLES.OTHER;}

function filtrerSuggestions(word, reps){
  return (reps||[])
    .map(r=>r.value)
    .filter(s=>{
      if(!s||s===word)return false;
      if(s.includes(' ')&&!word.includes(' '))return false;
      if(s.length>word.length*3)return false;
      return true;
    });
}

function buildPhraseCtx(eIdx){
  const e=errors[eIdx], text=originalText;
  let ps=0, pe=text.length;
  for(let i=e.start;i>=0;i--){
    if(i===0){ps=0;break;}
    if('.!?\n'.includes(text[i-1])){ps=i;break;}
  }
  for(let i=e.start+e.len;i<text.length;i++){
    if('.!?\n'.includes(text[i])){pe=i+1;break;}
  }
  const before=text.slice(ps,e.start);
  const after=text.slice(e.start+e.len,pe);
  const s=sFor(e.cat);
  const st=answered[eIdx];

  if(st!==null){
    if(st==='jnsp'){
      return `<div class="phrase-ctx"><span class="ctx-grey">${esc(before)}</span><span class="mot-jnsp">${esc(e.word)}</span><span class="ctx-grey">${esc(after)}</span></div>`;
    }
    if(st==='libre'){
      const ok=e.libreVal&&e.libreVal.trim().toLowerCase()===e.bonne.trim().toLowerCase();
      return `<div class="phrase-ctx"><span class="ctx-grey">${esc(before)}</span><span class="trou-btn ${ok?'ok':'ko'}" style="pointer-events:none;display:inline-block;vertical-align:middle;margin:0 4px">${ok?'✓':''} ${esc(e.libreVal||'')}</span><span class="ctx-grey">${esc(after)}</span></div>`;
    }
    let btns='';
    e.choix.forEach((c,ci)=>{
      let cls='trou-btn '+(c===e.bonne?'ok':ci===st?'ko':'grise');
      let ico=c===e.bonne?'✓ ':ci===st?'✗ ':'';
      btns+=`<button class="${cls}">${ico}${esc(c)}</button>`;
    });
    return `<div class="phrase-ctx"><span class="ctx-grey">${esc(before)}</span><span class="trou-wrap">${btns}</span><span class="ctx-grey">${esc(after)}</span></div>`;
  }

  let btns='';
  e.choix.forEach((c,ci)=>{
    btns+=`<button class="trou-btn ${s.btn}" id="tb-${eIdx}-${ci}" onclick="repondre(${eIdx},${ci})">${esc(c)}</button>`;
  });
  const libreHtml=`<div class="libre-row"><input class="saisie-libre" id="libre-${eIdx}" type="text" placeholder="Écris ici…" onkeydown="if(event.key==='Enter')validerLibre(${eIdx})"><button class="btn-valider" onclick="validerLibre(${eIdx})">OK ✓</button></div>`;
  const jnspHtml=`<button class="btn-jnsp" id="jnsp-${eIdx}" onclick="jnsp(${eIdx})">❓ Je ne sais pas</button>`;

  return `<div class="phrase-ctx"><span class="ctx-grey">${esc(before)}</span><span class="trou-wrap">${btns}${libreHtml}${jnspHtml}</span><span class="ctx-grey">${esc(after)}</span></div>`;
}

async function lancer(){
  const text=document.getElementById('txt').value.trim();
  if(!text)return;
  originalText=text;
  const btn=document.getElementById('btnGo');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Analyse en cours…';
  let ltMatches=[];
  try{
    const resp=await fetch('https://api.languagetool.org/v2/check',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({language:'fr',text})
    });
    const data=await resp.json();
    ltMatches=data.matches||[];
  }catch(e){
    btn.disabled=false;
    btn.innerHTML='🔍 Vérifier mon texte';
    alert('Impossible de contacter le correcteur. Vérifie ta connexion.');
    return;
  }
  btn.disabled=false;
  btn.innerHTML='🔍 Vérifier mon texte';

  errors=[];
  for(const m of ltMatches){
    const word=originalText.slice(m.offset,m.offset+m.length);
    if(!word.trim())continue;
    const suggestions=filtrerSuggestions(word,m.replacements||[]);
    if(!suggestions.length)continue;
    const bonne=suggestions[0];
    const choix=[word,bonne];
    const issueType=m.rule&&m.rule.issueType;
    const cat={'misspelling':'TYPOS','grammar':'GRAMMAR','style':'STYLE'}[issueType]||'OTHER';
    let lecon=(m.message||'').replace(/\(.*?\)/g,'').trim();
    if(lecon.length>200)lecon=lecon.slice(0,197)+'…';
    errors.push({cat,word,start:m.offset,len:m.length,choix,bonne,lecon,libreVal:null});
  }
  errors=errors.slice(0,8);
  idx=0;correct=0;answered=new Array(errors.length).fill(null);

  document.getElementById('saisie').style.display='none';
  const corr=document.getElementById('correction');
  corr.style.display='block';
  corr.innerHTML=`
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
      <span class="progress-count" id="pcount">0 / ${errors.length}</span>
    </div>
    <div id="erreurCard"></div>
    <div class="fin-card" id="finCard">
      <div class="fin-score" id="finScore"></div>
      <div class="fin-label" id="finLabel"></div>
      <button class="btn-rec" onclick="recommencer()">🔄 Nouveau texte</button>
    </div>`;

  if(!errors.length){
    document.getElementById('erreurCard').innerHTML=`<div class="ok-box"><p style="font-size:36px;margin-bottom:8px">✅</p><p style="color:#27500A;font-weight:700;font-size:17px;font-family:'Baloo 2',sans-serif">Bravo ! Aucune erreur trouvée.</p></div>`;
  }else{
    afficherErreur(0);
  }
}

function afficherErreur(i){
  const e=errors[i], total=errors.length;
  const fait=answered.filter(x=>x!==null).length;
  document.getElementById('pfill').style.width=Math.round(fait/total*100)+'%';
  document.getElementById('pcount').textContent=fait+' / '+total;
  const s=sFor(e.cat);
  const st=answered[i];
  const deja=st!==null;

  let fbHtml='', navHtml='';
  if(deja){
    let msg='', cls='';
    if(st==='jnsp'){
      msg=`ℹ️ La bonne réponse était <strong>${esc(e.bonne)}</strong>. Retiens-la pour la prochaine fois !`;
      cls='skip';
    } else if(st==='libre'){
      const ok=e.libreVal&&e.libreVal.trim().toLowerCase()===e.bonne.trim().toLowerCase();
      cls=ok?'good':'bad';
      msg=ok
        ?`✅ <strong>Bravo !</strong> Tu as bien écrit <strong>${esc(e.bonne)}</strong> !`
        :`❌ <strong>Pas tout à fait.</strong> Tu as écrit "${esc(e.libreVal||'')}", la bonne réponse est <strong>${esc(e.bonne)}</strong>.`;
    } else {
      const ok=e.choix[st]===e.bonne;
      cls=ok?'good':'bad';
      msg=ok
        ?`✅ <strong>Bravo !</strong> La bonne réponse est bien <strong>${esc(e.bonne)}</strong>.`
        :`❌ <strong>Pas tout à fait.</strong> La bonne réponse est <strong>${esc(e.bonne)}</strong>.`;
    }
    fbHtml=`<div class="feedback-zone show ${cls}"><div class="feedback-texte ${cls}">${msg}</div></div>`;
    navHtml=`<div class="nav-zone show"><button class="btn-suiv" onclick="suivant()"><span>${i===total-1?'Voir mon bilan':'Erreur suivante'}</span> →</button></div>`;
  }

  document.getElementById('erreurCard').innerHTML=`
    <div class="erreur-card ${s.card}">
      <div class="card-header ${s.header}">
        <span class="badge ${s.badge}">${s.label}</span>
        <span class="num-badge">Erreur ${i+1} sur ${total}</span>
      </div>
      ${buildPhraseCtx(i)}
      <div class="lecon-zone">
        <div class="lecon-titre">💡 La règle</div>
        <div class="lecon-texte">${esc(e.lecon)}</div>
      </div>
      ${fbHtml}${navHtml}
    </div>`;
}

function repondre(i,ci){
  if(answered[i]!==null)return;
  const e=errors[i];
  if(e.choix[ci]===e.bonne)correct++;
  answered[i]=ci;
  majProgres();
  afficherErreur(i);
}

function validerLibre(i){
  if(answered[i]!==null)return;
  const input=document.getElementById('libre-'+i);
  const val=(input?input.value:'').trim();
  if(!val)return;
  errors[i].libreVal=val;
  answered[i]='libre';
  if(val.toLowerCase()===errors[i].bonne.trim().toLowerCase())correct++;
  majProgres();
  afficherErreur(i);
}

function jnsp(i){
  if(answered[i]!==null)return;
  answered[i]='jnsp';
  majProgres();
  afficherErreur(i);
}

function majProgres(){
  const fait=answered.filter(x=>x!==null).length;
  document.getElementById('pfill').style.width=Math.round(fait/errors.length*100)+'%';
  document.getElementById('pcount').textContent=fait+' / '+errors.length;
}

function suivant(){
  if(idx===errors.length-1)afficherBilan();
  else{idx++;afficherErreur(idx);}
}

function afficherBilan(){
  document.getElementById('erreurCard').innerHTML='';
  const fin=document.getElementById('finCard');
  fin.className='fin-card show';
  const pct=Math.round(correct/errors.length*100);
  document.getElementById('finScore').textContent=correct+' / '+errors.length;
  document.getElementById('pfill').style.width='100%';
  document.getElementById('pcount').textContent=errors.length+' / '+errors.length;
  document.getElementById('finLabel').textContent=
    pct===100?'Parfait ! Toutes les erreurs corrigées !':
    pct>=80?'Très bien ! Continue comme ça.':
    pct>=60?'Pas mal ! Relis les leçons pour progresser.':
    'Continue à t\'entraîner, tu vas y arriver !';
}

function recommencer(){
  document.getElementById('correction').style.display='none';
  document.getElementById('saisie').style.display='block';
  document.getElementById('txt').value='';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
