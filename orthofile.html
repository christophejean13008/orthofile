<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon correcteur</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f8f9fa;min-height:100vh;padding:1rem}
.app{max-width:680px;margin:0 auto;padding:1rem 0}
h1{font-size:22px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:4px;font-family:'Baloo 2',sans-serif}
.sub{font-size:14px;color:#666;text-align:center;margin-bottom:1rem}
.level-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.level-row span{font-size:12px;color:#888}
.lvl{padding:5px 14px;font-size:13px;font-weight:600;border:1.5px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;color:#666;font-family:'Nunito',sans-serif}
.lvl.active{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.tab-btn{padding:8px 16px;font-size:14px;font-weight:600;border:1.5px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;color:#666;font-family:'Nunito',sans-serif;transition:all .15s}
.tab-btn.active{background:#3B6D11;border-color:#3B6D11;color:#fff}
textarea{width:100%;min-height:120px;padding:12px;font-size:15px;line-height:1.7;border:1.5px solid #ccc;border-radius:12px;resize:vertical;font-family:'Nunito',sans-serif;color:#1a1a1a;background:#fff}
textarea:focus{outline:none;border-color:#378ADD}
.btn-go{background:#3B6D11;border:none;color:#fff;font-size:16px;font-weight:700;padding:12px 24px;margin-top:10px;width:100%;cursor:pointer;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Baloo 2',sans-serif;transition:background .15s}
.btn-go:hover{background:#27500A}
.btn-go:disabled{background:#aaa;cursor:not-allowed}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.correction{display:none}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.progress-track{flex:1;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:#639922;border-radius:4px;transition:width 0.4s}
.progress-count{font-size:13px;font-weight:700;color:#1a1a1a;white-space:nowrap}
.phrase-ctx{font-size:17px;line-height:3.2;padding:18px 18px 14px;background:#f4f4f4;font-family:'Nunito',sans-serif;color:#1a1a1a}
.ctx-grey{color:#999}
.trou-wrap{display:inline-flex;flex-direction:column;align-items:stretch;vertical-align:middle;margin:0 4px;gap:6px}
.trou-btn{padding:7px 18px;font-size:17px;font-weight:700;border:2.5px solid;border-radius:10px;cursor:pointer;font-family:'Baloo 2',sans-serif;white-space:nowrap;transition:all .15s;line-height:1.3;text-align:center;min-width:80px}
.trou-btn:active{transform:scale(0.97)}
.btn-TYPOS{background:#E1F5EE;border-color:#5DCAA5;color:#085041}.btn-TYPOS:hover{background:#9FE1CB}
.btn-GRAMMAR{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}.btn-GRAMMAR:hover{background:#B5D4F4}
.btn-STYLE{background:#EEEDFE;border-color:#AFA9EC;color:#26215C}.btn-STYLE:hover{background:#CECBF6}
.btn-OTHER{background:#FAEEDA;border-color:#EF9F27;color:#412402}.btn-OTHER:hover{background:#FAC775}
.trou-btn.ok{background:#EAF3DE;border-color:#3B6D11;color:#173404;pointer-events:none}
.trou-btn.ko{background:#FCEBEB;border-color:#A32D2D;color:#501313;pointer-events:none}
.trou-btn.grise{opacity:.35;pointer-events:none}
.libre-row{display:flex;gap:5px;align-items:center}
.saisie-libre{font-size:16px;font-weight:700;font-family:'Baloo 2',sans-serif;padding:6px 10px;border:2.5px solid #AFA9EC;border-radius:10px;width:130px;background:#fff;color:#1a1a1a;text-align:center}
.saisie-libre:focus{outline:none;border-color:#7F77DD}
.btn-valider{background:#EEEDFE;border:2.5px solid #AFA9EC;color:#26215C;font-size:13px;font-weight:700;font-family:'Baloo 2',sans-serif;padding:6px 12px;border-radius:10px;cursor:pointer}
.btn-valider:hover{background:#CECBF6}
.btn-jnsp{background:#fff;border:2px dashed #ccc;color:#888;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;padding:6px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}
.btn-jnsp:hover{background:#f0f0f0}
.mot-jnsp{color:#bbb;font-weight:700;font-style:italic;background:#f0f0f0;padding:2px 8px;border-radius:6px;border:2px dashed #ddd}
.erreur-card{border-radius:16px;overflow:hidden;margin-bottom:1rem;border:2px solid}
.card-TYPOS{border-color:#5DCAA5}.card-GRAMMAR{border-color:#85B7EB}.card-STYLE{border-color:#AFA9EC}.card-OTHER{border-color:#EF9F27}
.card-header{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.header-TYPOS{background:#E1F5EE}.header-GRAMMAR{background:#E6F1FB}.header-STYLE{background:#EEEDFE}.header-OTHER{background:#FAEEDA}
.badge{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;font-family:'Baloo 2',sans-serif}
.badge-TYPOS{background:#5DCAA5;color:#04342C}.badge-GRAMMAR{background:#85B7EB;color:#042C53}.badge-STYLE{background:#AFA9EC;color:#26215C}.badge-OTHER{background:#EF9F27;color:#412402}
.num-badge{font-size:12px;color:#888;font-weight:600}
.lecon-zone{padding:16px 18px;border-bottom:1.5px solid #AFA9EC;background:#EEEDFE;border-top:1.5px solid #AFA9EC}
.lecon-titre{font-size:11px;font-weight:700;color:#534AB7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:'Baloo 2',sans-serif;display:flex;align-items:center;gap:6px}
.lecon-texte{font-size:15px;line-height:1.75;color:#26215C;font-weight:600}
.feedback-zone{padding:14px 18px;display:none;border-top:1.5px solid #ddd}
.feedback-zone.show{display:block}
.feedback-zone.good{background:#EAF3DE}.feedback-zone.bad{background:#FCEBEB}.feedback-zone.skip{background:#f4f4f4}
.feedback-texte{font-size:15px;line-height:1.6;font-weight:600}
.feedback-texte.good{color:#173404}.feedback-texte.bad{color:#501313}.feedback-texte.skip{color:#666}
.nav-zone{padding:14px 18px;display:none;border-top:1.5px solid #ddd;background:#f4f4f4}
.nav-zone.show{display:flex;justify-content:flex-end}
.btn-suiv{padding:11px 26px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#3B6D11;color:#fff;display:inline-flex;align-items:center;gap:8px;font-family:'Baloo 2',sans-serif}
.btn-suiv:hover{background:#27500A}
.ok-box{background:#EAF3DE;border-radius:16px;padding:2rem;text-align:center;border:2px solid #97C459}
/* ── ÉCRAN BILAN PLEIN ÉCRAN ── */
.bilan-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:1000;overflow-y:auto;flex-direction:column}
.bilan-screen.show{display:flex}
.bilan-header{background:#3B6D11;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.bilan-header h2{color:#fff;font-size:18px;font-weight:700;font-family:'Baloo 2',sans-serif;margin:0}
.bilan-score-badge{background:#fff;color:#3B6D11;font-size:15px;font-weight:700;padding:4px 14px;border-radius:20px;font-family:'Baloo 2',sans-serif}
.bilan-body{flex:1;padding:24px 20px 0;display:flex;flex-direction:column;gap:16px}
.bilan-label{font-size:13px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-family:'Baloo 2',sans-serif}
.bilan-phrase{font-size:22px;line-height:2.8;font-family:'Nunito',sans-serif;color:#1a1a1a;background:#f8f8f8;border-radius:14px;padding:20px 22px;border:1.5px solid #e0e0e0}
.mot-barre{text-decoration:line-through;color:#ccc;font-weight:700;font-size:20px}
.mot-vert{color:#2D7A1E;font-weight:700;font-size:26px}
.mot-jnsp-bilan{color:#bbb;font-weight:700;font-style:italic}
.fleche-corr{color:#97C459;font-weight:700;margin:0 3px;font-size:18px}
.bilan-legende{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#888}
.bilan-footer{padding:20px;border-top:1.5px solid #eee;background:#fafafa;flex-shrink:0;margin-top:20px}
.bilan-msg{text-align:center;font-size:16px;font-weight:700;color:#3B6D11;margin-bottom:16px;font-family:'Baloo 2',sans-serif}
.btn-nouveau{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#3B6D11;color:#fff;font-family:'Baloo 2',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-nouveau:hover{background:#27500A}
</style>
</head>
<body>
<div class="app">
  <div id="saisie">
    <h1>✏️ Mon correcteur</h1>
    <p class="sub">Écris ton texte — je t'aide à te corriger toi-même !</p>
    <div class="level-row">
      <span>Niveau :</span>
      <button class="lvl active" onclick="setLevel('cp')" id="l-cp">CP</button>
      <button class="lvl" onclick="setLevel('ce1')" id="l-ce1">CE1</button>
      <button class="lvl" onclick="setLevel('ce2')" id="l-ce2">CE2</button>
      <button class="lvl" onclick="setLevel('cm')" id="l-cm">CM1-CM2</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="tab-btn active" id="tab-txt" onclick="switchTab('txt')">⌨️ Taper le texte</button>
      <button class="tab-btn" id="tab-photo" onclick="switchTab('photo')">📷 Photo du texte</button>
    </div>
    <div id="panel-txt">
      <textarea id="txt" placeholder="Écris ton texte ici…&#10;Exemple : jéme mon omme qui fé des programme"></textarea>
      <button class="btn-go" id="btnGo" onclick="lancer()">🔍 Vérifier mon texte</button>
    </div>
    <div id="panel-photo" style="display:none">
      <div onclick="document.getElementById('fileInput').click()" style="border:2px dashed #ccc;border-radius:12px;padding:2rem;text-align:center;cursor:pointer;background:#fff;">
        <div style="font-size:36px;margin-bottom:8px">📷</div>
        <p style="font-size:15px;font-weight:600;color:#333;margin-bottom:4px">Appuie ici pour prendre une photo</p>
        <p style="font-size:13px;color:#888">ou choisir une image de ta galerie</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
      <img id="previewImg" style="max-width:100%;border-radius:10px;margin-top:12px;display:none" alt="Aperçu">
      <p id="ocrStatus" style="display:none;margin-top:10px;font-size:14px;color:#666;text-align:center"></p>
      <button class="btn-go" id="btnPhoto" style="display:none;margin-top:10px" onclick="lancerPhoto()">🔍 Corriger ce texte</button>
    </div>
  </div>
  <div class="correction" id="correction"></div>
</div>

<!-- BILAN PLEIN ÉCRAN -->
<div class="bilan-screen" id="bilanScreen">
  <div class="bilan-header">
    <h2>📝 Ma correction</h2>
    <span class="bilan-score-badge" id="bilanScoreBadge"></span>
  </div>
  <div class="bilan-body">
    <div>
      <div class="bilan-label">✏️ Ton texte avec les corrections</div>
      <div class="bilan-phrase" id="bilanPhrase"></div>
    </div>
    <div class="bilan-legende">
      <span><span style="text-decoration:line-through;color:#ccc;font-weight:700">mot</span> mal écrit</span>
      <span><span style="color:#2D7A1E;font-weight:700;font-size:16px">mot</span> bonne orthographe</span>
      <span><span style="color:#bbb;font-style:italic">mot</span> non su</span>
    </div>
  </div>
  <div class="bilan-footer">
    <div class="bilan-msg" id="bilanMsg"></div>
    <button class="btn-nouveau" onclick="recommencer()">✏️ Nouveau texte</button>
  </div>
</div>

<script>
let level='cp', errors=[], idx=0, correct=0, answered=[], originalText='';
let photoBase64=null, photoMime='image/jpeg';

function setLevel(l){
  level=l;
  ['cp','ce1','ce2','cm'].forEach(x=>document.getElementById('l-'+x).classList.toggle('active',x===l));
}

function switchTab(t){
  document.getElementById('panel-txt').style.display=t==='txt'?'block':'none';
  document.getElementById('panel-photo').style.display=t==='photo'?'block':'none';
  document.getElementById('tab-txt').classList.toggle('active',t==='txt');
  document.getElementById('tab-photo').classList.toggle('active',t==='photo');
}

const STYLES={
  TYPOS  :{card:'card-TYPOS',  header:'header-TYPOS',  btn:'btn-TYPOS',  badge:'badge-TYPOS',  label:'Orthographe'},
  GRAMMAR:{card:'card-GRAMMAR',header:'header-GRAMMAR',btn:'btn-GRAMMAR',badge:'badge-GRAMMAR',label:'Grammaire'},
  STYLE  :{card:'card-STYLE',  header:'header-STYLE',  btn:'btn-STYLE',  badge:'badge-STYLE',  label:'Style'},
  OTHER  :{card:'card-OTHER',  header:'header-OTHER',  btn:'btn-OTHER',  badge:'badge-OTHER',  label:'Autre'},
};
function sFor(cat){return STYLES[cat]||STYLES.OTHER;}

// Frontières de mots compatibles avec les accents
const WS='(?<![a-zA-Z\u00C0-\u024F])';
const WE='(?![a-zA-Z\u00C0-\u024F])';
const W=p=>new RegExp(WS+'('+p+')'+WE,'gi');

// ── DICTIONNAIRE PHONÉTIQUE ───────────────────────────────────────────────────
const PHONO=[
  {re:W('j[ée]me'),     right:"j'aime",  cat:'TYPOS',   lecon:"j\'aime s\'écrit avec une apostrophe : j\'aime le chocolat."},
  {re:W('jaime'),       right:"j'aime",  cat:'TYPOS',   lecon:"j\'aime s\'écrit avec une apostrophe entre j et aime."},
  {re:W('vé'),          right:'vais',    cat:'GRAMMAR', lecon:'je vais : conjugaison du verbe aller. On écrit vais et non vé.'},
  {re:W('jai'),         right:"j'ai",    cat:'TYPOS',   lecon:"j\'ai s\'écrit avec une apostrophe : j\'ai mangé."},
  {re:W('jé'),          right:"j'ai",    cat:'TYPOS',   lecon:"j\'ai (verbe avoir) s\'écrit avec apostrophe : j\'ai faim."},
  {re:W('sé'),          right:"c'est",   cat:'TYPOS',   lecon:"c\'est s\'écrit avec c apostrophe est : c\'est bon."},
  {re:W('fé'),          right:'fait',    cat:'GRAMMAR', lecon:'fait (verbe faire) : avec ai et t muet. Il fait beau.'},
  {re:W('ché'),         right:'chez',    cat:'TYPOS',   lecon:'chez : avec un z final muet. Je vais chez moi.'},
  {re:W('apré'),        right:'après',   cat:'TYPOS',   lecon:'après : avec un è et un s muet. Après l\'école.'},
  {re:W('koi'),         right:'quoi',    cat:'TYPOS',   lecon:'quoi : avec qu. Quoi de neuf ?'},
  {re:W('kan[dt]?'),    right:'quand',   cat:'TYPOS',   lecon:'quand : avec qu, se termine par nd. Quand tu veux.'},
  {re:W('parseke'),     right:'parce que',cat:'TYPOS',  lecon:'parce que : deux mots séparés.'},
  {re:W('biensur'),     right:'bien sûr', cat:'TYPOS',  lecon:'bien sûr : deux mots, avec accent sur le û.'},
  // ── Confusions p/b/t/d ───────────────────────────────────────────────────────
  {re:W('pate'),         right:'pâte',   cat:'TYPOS',   lecon:'pâte : avec accent circonflexe sur le â. De la pâte à modeler.'},
  {re:W('[bdt]âtes?'),   right:'pâtes',  cat:'TYPOS',   lecon:'pâtes : commence par p ! Attention à ne pas confondre p, b, t et d.'},
  {re:W('pâ[bds]es?'),   right:'pâtes',  cat:'TYPOS',   lecon:'pâtes : avec un t. Le t et le d se ressemblent à l\'oreille.'},
  {re:W('[bdt]ain'),     right:'pain',   cat:'TYPOS',   lecon:'pain (à manger) commence par p. bain (dans l\'eau) commence par b.'},
  {re:W('[bdt]ortes?'),  right:'porte',  cat:'TYPOS',   lecon:'porte commence par p. La porte de la maison.'},
  {re:W('[bdt]attes?'),  right:'pattes', cat:'TYPOS',   lecon:'pattes (pieds des animaux) commence par p. Les pattes du chat.'},
  {re:W('[bdt]atte'),    right:'patte',  cat:'TYPOS',   lecon:'patte commence par p et s\'écrit avec tt.'},
  {re:W('[td]oules?'),   right:'boules', cat:'TYPOS',   lecon:'boules commence par b. Des boules.'},
  {re:W('[td]oule'),     right:'boule',  cat:'TYPOS',   lecon:'boule commence par b. Une boule de neige.'},
  {re:W('[tp]ans'),      right:'dans',   cat:'TYPOS',   lecon:'dans commence par d. Je suis dans la maison.'},
  {re:W('[tb]ents?'),    right:'dents',  cat:'TYPOS',   lecon:'dents commence par d. Les dents.'},
  {re:W('[tb]ent'),      right:'dent',   cat:'TYPOS',   lecon:'dent commence par d. Une dent.'},
  {re:W('[tb]os'),       right:'dos',    cat:'TYPOS',   lecon:'dos commence par d. Le dos.'},
  {re:W('bont'),         right:'pont',   cat:'TYPOS',   lecon:'pont commence par p. Le pont sur la rivière.'},
  // ── Chocolat et alimentation ─────────────────────────────────────────────────
  {re:W('chocolas?'),    right:'chocolat',cat:'TYPOS',  lecon:'chocolat : se termine par t muet. Du chocolat. Le t est muet mais il est là !'},
  {re:W('chocota[st]?'), right:'chocolat',cat:'TYPOS',  lecon:'chocolat : ch-o-c-o-l-a-t. Le l vient avant le t !'},
  {re:W('chokola[st]?'), right:'chocolat',cat:'TYPOS',  lecon:'chocolat : avec ch (et non k). Du chocolat.'},
  {re:W('gateau[x]?'),   right:'gâteau',  cat:'TYPOS',  lecon:'gâteau : avec accent circonflexe sur le â. Un gâteau.'},
  // ── Noms courants ────────────────────────────────────────────────────────────
  {re:W('omme'),         right:'homme',   cat:'TYPOS',  lecon:'homme : avec un h muet au début. Un homme.'},
  {re:W('pommr'),        right:'pommes',  cat:'TYPOS',  lecon:'pommes : avec deux m. Des pommes.'},
  {re:W('programm?e?'),  right:'programme',cat:'TYPOS', lecon:'programme : avec deux m. Un programme.'},
  {re:W('jardan'),       right:'jardin',  cat:'TYPOS',  lecon:'jardin : se termine par in. Le jardin.'},
  {re:W('lappin'),       right:'lapin',   cat:'TYPOS',  lecon:'lapin : avec un seul p.'},
  {re:W('garson'),       right:'garçon',  cat:'TYPOS',  lecon:'garçon : avec une cédille. Un garçon.'},
  {re:W('elifant'),      right:'éléphant',cat:'TYPOS',  lecon:'éléphant : avec ph pour le son f.'},
  {re:W('giraffe'),      right:'girafe',  cat:'TYPOS',  lecon:'girafe : avec un seul f.'},
  {re:W('ecole'),        right:'école',   cat:'TYPOS',  lecon:'école : commence par un é accentué.'},
  {re:W('balont'),       right:'ballon',  cat:'TYPOS',  lecon:'ballon : avec ll, finit par on.'},
  {re:W('fanetre'),      right:'fenêtre', cat:'TYPOS',  lecon:'fenêtre : accent circonflexe sur le ê.'},
  {re:W('soley'),        right:'soleil',  cat:'TYPOS',  lecon:'soleil : se termine par eil.'},
  {re:W('nuaje'),        right:'nuage',   cat:'TYPOS',  lecon:'nuage : avec ge.'},
  {re:W('fourmin'),      right:'fourmi',  cat:'TYPOS',  lecon:'fourmi : se termine par mi sans n.'},
  {re:W('entant'),       right:'enfant',  cat:'TYPOS',  lecon:'enfant : avec en et an.'},
  {re:W('argen'),        right:'argent',  cat:'TYPOS',  lecon:'argent : se termine par un t muet.'},
  {re:W('chato'),        right:'château', cat:'TYPOS',  lecon:'château : accent circonflexe sur le â.'},
  {re:W('papion'),       right:'papillon',cat:'TYPOS',  lecon:'papillon : avec ill.'},
  {re:W('tanbour'),      right:'tambour', cat:'TYPOS',  lecon:'tambour : avec am devant le b.'},
];

function detecterPhono(text, dejaVus){
  const trouvees=[];
  for(const p of PHONO){
    const re=new RegExp(p.re.source,p.re.flags);
    let m;
    while((m=re.exec(text))!==null){
      const key='phono|'+m.index;
      if(dejaVus.has(key))continue;
      dejaVus.add(key);
      const word=m[0];
      trouvees.push({cat:p.cat,word,start:m.index,len:word.length,
        choix:[word,p.right],bonne:p.right,lecon:p.lecon,libreVal:null});
    }
  }
  return trouvees;
}

function buildPhraseCtx(eIdx){
  const e=errors[eIdx], text=originalText;
  let ps=0, pe=text.length;
  for(let i=e.start;i>=0;i--){if(i===0){ps=0;break;}if('.!?\n'.includes(text[i-1])){ps=i;break;}}
  for(let i=e.start+e.len;i<text.length;i++){if('.!?\n'.includes(text[i])){pe=i+1;break;}}
  const before=text.slice(ps,e.start);
  const after=text.slice(e.start+e.len,pe);
  const s=sFor(e.cat);
  const st=answered[eIdx];
  if(st!==null){
    if(st==='jnsp')return`<div class="phrase-ctx"><span class="ctx-grey">${esc(before)}</span><span class="mot-jnsp">${esc(e.word)}</span><span class="ctx-grey">${esc(after)}</span></div>`;
    if(st==='libre'){
      const ok=e.libreVal&&e.libreVal.trim().toLowerCase()===e.bonne.trim().toLowerCase();
      return`<div class="phrase-ctx"><span class="ctx-grey">${esc(before)}</span><span class="trou-btn ${ok?'ok':'ko'}" style="pointer-events:none;display:inline-block;vertical-align:middle;margin:0 4px">${ok?'✓ ':''} ${esc(e.libreVal||'')}</span><span class="ctx-grey">${esc(after)}</span></div>`;
    }
    let btns='';
    e.choix.forEach((c,ci)=>{
      let cls='trou-btn '+(c===e.bonne?'ok':ci===st?'ko':'grise');
      let ico=c===e.bonne?'✓ ':ci===st?'✗ ':'';
      btns+=`<button class="${cls}">${ico}${esc(c)}</button>`;
    });
    return`<div class="phrase-ctx"><span class="ctx-grey">${esc(before)}</span><span class="trou-wrap">${btns}</span><span class="ctx-grey">${esc(after)}</span></div>`;
  }
  let btns='';
  e.choix.forEach((c,ci)=>{
    btns+=`<button class="trou-btn ${s.btn}" id="tb-${eIdx}-${ci}" onclick="repondre(${eIdx},${ci})">${esc(c)}</button>`;
  });
  const libre=`<div class="libre-row"><input class="saisie-libre" id="libre-${eIdx}" type="text" placeholder="Écris ici…" onkeydown="if(event.key==='Enter')validerLibre(${eIdx})"><button class="btn-valider" onclick="validerLibre(${eIdx})">OK ✓</button></div>`;
  const jnsp=`<button class="btn-jnsp" id="jnsp-${eIdx}" onclick="jnsp(${eIdx})">❓ Je ne sais pas</button>`;
  return`<div class="phrase-ctx"><span class="ctx-grey">${esc(before)}</span><span class="trou-wrap">${btns}${libre}${jnsp}</span><span class="ctx-grey">${esc(after)}</span></div>`;
}

async function lancer(){
  const text=document.getElementById('txt').value.trim();
  if(!text)return;
  originalText=text;
  const btn=document.getElementById('btnGo');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Analyse en cours…';
  let ltMatches=[];
  try{
    const resp=await fetch('https://api.languagetool.org/v2/check',{method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({language:'fr',text})});
    const data=await resp.json();
    ltMatches=data.matches||[];
  }catch(e){}
  btn.disabled=false;btn.innerHTML='🔍 Vérifier mon texte';

  const dejaVus=new Set();
  errors=[];
  // 1. Dictionnaire phonétique local (prioritaire)
  for(const e of detecterPhono(originalText,dejaVus)) errors.push(e);
  // 2. LanguageTool pour le reste
  for(const m of ltMatches){
    const word=originalText.slice(m.offset,m.offset+m.length);
    if(!word.trim())continue;
    const chevauche=errors.some(e=>m.offset<e.start+e.len&&m.offset+m.length>e.start);
    if(chevauche)continue;
    const key='lt|'+m.offset;
    if(dejaVus.has(key))continue;dejaVus.add(key);
    const suggestions=filtrerSuggestions(word,m.replacements||[]);
    if(!suggestions.length)continue;
    const bonne=suggestions[0];
    if(bonne===word)continue;
    // Construire jusqu'à 3 choix : mot fautif + 1-2 bonnes suggestions
    const autresSugg=suggestions.slice(1,2);
    const choix=[word,bonne,...autresSugg];
    const issueType=m.rule&&m.rule.issueType;
    const cat={'misspelling':'TYPOS','grammar':'GRAMMAR','style':'STYLE'}[issueType]||'OTHER';
    let lecon=(m.message||'').replace(/\(.*?\)/g,'').trim();
    if(lecon.length>200)lecon=lecon.slice(0,197)+'…';
    errors.push({cat,word,start:m.offset,len:m.length,choix,bonne,lecon,libreVal:null});
  }
  errors.sort((a,b)=>a.start-b.start);
  errors=errors.slice(0,8);
  idx=0;correct=0;answered=new Array(errors.length).fill(null);

  document.getElementById('saisie').style.display='none';
  const corr=document.getElementById('correction');
  corr.style.display='block';
  corr.innerHTML=`<div class="progress-row"><div class="progress-track"><div class="progress-fill" id="pfill" style="width:0%"></div></div><span class="progress-count" id="pcount">0 / ${errors.length}</span></div><div id="erreurCard"></div>`;
  if(!errors.length){
    document.getElementById('erreurCard').innerHTML=`<div class="ok-box"><p style="font-size:36px;margin-bottom:8px">✅</p><p style="color:#27500A;font-weight:700;font-size:17px;font-family:'Baloo 2',sans-serif">Bravo ! Aucune erreur trouvée.</p><br><button class="btn-nouveau" style="margin:0 auto;width:auto;padding:12px 24px" onclick="recommencer()">✏️ Nouveau texte</button></div>`;
  }else{
    afficherErreur(0);
  }
}

function afficherErreur(i){
  const e=errors[i],total=errors.length;
  const fait=answered.filter(x=>x!==null).length;
  document.getElementById('pfill').style.width=Math.round(fait/total*100)+'%';
  document.getElementById('pcount').textContent=fait+' / '+total;
  const s=sFor(e.cat);
  const st=answered[i];
  const deja=st!==null;
  let fbHtml='',navHtml='';
  if(deja){
    let msg='',cls='';
    if(st==='jnsp'){
      msg=`ℹ️ La bonne réponse était <strong>${esc(e.bonne)}</strong>. Retiens-la !`;cls='skip';
    }else if(st==='libre'){
      const ok=e.libreVal&&e.libreVal.trim().toLowerCase()===e.bonne.trim().toLowerCase();
      cls=ok?'good':'bad';
      msg=ok?`✅ <strong>Bravo !</strong> Tu as bien écrit <strong>${esc(e.bonne)}</strong> !`
            :`❌ <strong>Pas tout à fait.</strong> La bonne réponse est <strong>${esc(e.bonne)}</strong>.`;
    }else{
      const ok=e.choix[st]===e.bonne;cls=ok?'good':'bad';
      msg=ok?`✅ <strong>Bravo !</strong> La bonne réponse est bien <strong>${esc(e.bonne)}</strong>.`
            :`❌ <strong>Pas tout à fait.</strong> La bonne réponse est <strong>${esc(e.bonne)}</strong>.`;
    }
    fbHtml=`<div class="feedback-zone show ${cls}"><div class="feedback-texte ${cls}">${msg}</div></div>`;
    navHtml=`<div class="nav-zone show"><button class="btn-suiv" onclick="suivant()"><span>${i===total-1?'Voir ma correction':'Erreur suivante'}</span> →</button></div>`;
  }
  document.getElementById('erreurCard').innerHTML=`
    <div class="erreur-card ${s.card}">
      <div class="card-header ${s.header}">
        <span class="badge ${s.badge}">${s.label}</span>
        <span class="num-badge">Erreur ${i+1} sur ${total}</span>
      </div>
      ${buildPhraseCtx(i)}
      <div class="lecon-zone">
        <div class="lecon-titre">💡 La règle</div>
        <div class="lecon-texte">${e.lecon}</div>
      </div>
      ${fbHtml}${navHtml}
    </div>`;
}

function repondre(i,ci){
  if(answered[i]!==null)return;
  if(errors[i].choix[ci]===errors[i].bonne)correct++;
  answered[i]=ci;majProgres();afficherErreur(i);
}

function validerLibre(i){
  if(answered[i]!==null)return;
  const input=document.getElementById('libre-'+i);
  const val=(input?input.value:'').trim();
  if(!val)return;
  errors[i].libreVal=val;
  answered[i]='libre';
  if(val.toLowerCase()===errors[i].bonne.trim().toLowerCase())correct++;
  majProgres();afficherErreur(i);
}

function jnsp(i){
  if(answered[i]!==null)return;
  answered[i]='jnsp';majProgres();afficherErreur(i);
}

function majProgres(){
  const fait=answered.filter(x=>x!==null).length;
  document.getElementById('pfill').style.width=Math.round(fait/errors.length*100)+'%';
  document.getElementById('pcount').textContent=fait+' / '+errors.length;
}

function suivant(){
  if(idx===errors.length-1)afficherBilan();
  else{idx++;afficherErreur(idx);}
}

function afficherBilan(){
  document.getElementById('pfill').style.width='100%';
  document.getElementById('pcount').textContent=errors.length+' / '+errors.length;
  const pct=errors.length>0?Math.round(correct/errors.length*100):100;
  let html='',pos=0;
  const sorted=[...errors].sort((a,b)=>a.start-b.start);
  for(const e of sorted){
    if(e.start<pos)continue;
    if(e.start>pos)html+=esc(originalText.slice(pos,e.start));
    const raw=originalText.slice(e.start,e.start+e.len);
    const st=answered[errors.indexOf(e)];
    if(st===null||st==='jnsp'){
      html+=`<span class="mot-jnsp-bilan">${esc(raw)}</span>`;
    }else{
      const wasOk=(st==='libre')
        ?(e.libreVal&&e.libreVal.trim().toLowerCase()===e.bonne.trim().toLowerCase())
        :(e.choix[st]===e.bonne);
      if(wasOk){
        html+=`<span class="mot-vert">${esc(e.bonne)}</span>`;
      }else{
        html+=`<span class="mot-barre">${esc(raw)}</span><span class="fleche-corr">→</span><span class="mot-vert">${esc(e.bonne)}</span>`;
      }
    }
    pos=e.start+e.len;
  }
  if(pos<originalText.length)html+=esc(originalText.slice(pos));
  document.getElementById('bilanPhrase').innerHTML=html;
  document.getElementById('bilanScoreBadge').textContent=correct+' / '+errors.length;
  const msgs=[[100,'Parfait ! Toutes les corrections en vert !'],[80,'Très bien ! Recopie les mots en vert.'],[60,'Pas mal ! Regarde bien les mots en vert.'],[0,'Recopie les mots en vert sur ta feuille.']];
  document.getElementById('bilanMsg').textContent=msgs.find(([s])=>pct>=s)[1];
  document.getElementById('correction').style.display='none';
  document.getElementById('bilanScreen').className='bilan-screen show';
}

function recommencer(){
  document.getElementById('correction').style.display='none';
  document.getElementById('bilanScreen').className='bilan-screen';
  document.getElementById('saisie').style.display='block';
  document.getElementById('txt').value='';
  photoBase64=null;
  document.getElementById('previewImg').style.display='none';
  const bp=document.getElementById('btnPhoto');if(bp)bp.style.display='none';
  switchTab('txt');
}

function handlePhoto(e){
  const f=e.target.files[0];if(!f)return;
  photoMime=f.type||'image/jpeg';
  const r=new FileReader();
  r.onload=ev=>{
    const img=document.getElementById('previewImg');
    img.src=ev.target.result;img.style.display='block';
    photoBase64=ev.target.result.split(',')[1];
    document.getElementById('btnPhoto').style.display='flex';
  };
  r.readAsDataURL(f);
}

async function lancerPhoto(){
  if(!photoBase64)return;
  const btn=document.getElementById('btnPhoto');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Chargement…';
  const status=document.getElementById('ocrStatus');
  status.style.display='block';
  status.textContent='Préparation du lecteur…';

  // Charger Tesseract.js dynamiquement seulement maintenant
  if(typeof Tesseract==='undefined'){
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js';
      s.onload=resolve;
      s.onerror=()=>reject(new Error('Impossible de charger le lecteur OCR. Vérifie ta connexion.'));
      document.head.appendChild(s);
    });
  }

  btn.innerHTML='<span class="spinner"></span> Lecture en cours…';
  status.textContent='Analyse de l\'image… (10-20 sec)';
  try{
    const imgSrc='data:'+photoMime+';base64,'+photoBase64;
    const result=await Tesseract.recognize(imgSrc,'fra',{
      logger:function(m){
        if(m.status==='recognizing text'){
          status.textContent='Lecture… '+Math.round((m.progress||0)*100)+'%';
        }
      }
    });
    let texte=(result.data.text||'').trim();
    texte=texte.replace(/\n{3,}/g,'\n').replace(/^\s+|\s+$/gm,'').trim();
    if(!texte||texte.length<3){
      status.textContent='Impossible de lire. Essaie avec une image plus nette.';
      btn.disabled=false;btn.innerHTML='\uD83D\uDD0D Corriger ce texte';return;
    }
    status.textContent='Lu : "'+texte.slice(0,60)+(texte.length>60?'\u2026':'')+'"';
    document.getElementById('txt').value=texte;
    switchTab('txt');
    lancer();
  }catch(err){
    status.textContent='Erreur : '+(err.message||'image illisible.');
    btn.disabled=false;btn.innerHTML='\uD83D\uDD0D Corriger ce texte';
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
