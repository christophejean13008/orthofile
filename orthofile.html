
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',var(--font-sans)}
.app{max-width:680px;padding:1rem 0}
h1{font-size:22px;font-weight:700;color:var(--color-text-primary);text-align:center;margin-bottom:4px;font-family:'Baloo 2',var(--font-sans)}
.sub{font-size:14px;color:var(--color-text-secondary);text-align:center;margin-bottom:1rem}
.level-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.level-row span{font-size:12px;color:var(--color-text-secondary)}
.lvl{padding:5px 14px;font-size:13px;font-weight:600;border:1.5px solid var(--color-border-secondary);border-radius:20px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);font-family:'Nunito',var(--font-sans)}
.lvl.active{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
textarea{width:100%;min-height:120px;padding:12px;font-size:15px;line-height:1.7;border:1.5px solid var(--color-border-secondary);border-radius:12px;resize:vertical;font-family:'Nunito',var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary)}
textarea:focus{outline:none;border-color:#378ADD}
.btn-go{background:#3B6D11;border:none;color:#fff;font-size:16px;font-weight:700;padding:12px 24px;margin-top:10px;width:100%;cursor:pointer;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Baloo 2',var(--font-sans);transition:background .15s}
.btn-go:hover{background:#27500A}
.btn-go:active{transform:scale(0.98)}
.btn-go:disabled{background:#aaa;cursor:not-allowed}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.correction{display:none}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.progress-track{flex:1;height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:#639922;border-radius:4px;transition:width 0.4s}
.progress-count{font-size:13px;font-weight:700;color:var(--color-text-primary);white-space:nowrap}

.phrase-ctx{font-size:17px;line-height:2.8;padding:18px 18px 14px;background:var(--color-background-secondary);border-radius:12px;margin-bottom:0;font-family:'Nunito',var(--font-sans);color:var(--color-text-primary)}
.ctx-before{color:var(--color-text-secondary)}
.ctx-after{color:var(--color-text-secondary)}
.trou-wrap{display:inline-flex;flex-direction:column;align-items:stretch;vertical-align:middle;margin:0 4px;gap:5px}
.trou-btn{padding:6px 18px;font-size:17px;font-weight:700;border:2.5px solid;border-radius:10px;cursor:pointer;font-family:'Baloo 2',var(--font-sans);white-space:nowrap;transition:all .15s;line-height:1.3;text-align:center}
.trou-btn:active{transform:scale(0.97)}
.trou-btn.ok{pointer-events:none}
.trou-btn.ko{pointer-events:none}
.trou-btn.grise{opacity:.35;pointer-events:none}
.btn-TYPOS{background:#E1F5EE;border-color:#5DCAA5;color:#085041}.btn-TYPOS:hover{background:#9FE1CB}
.btn-GRAMMAR{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}.btn-GRAMMAR:hover{background:#B5D4F4}
.btn-STYLE{background:#EEEDFE;border-color:#AFA9EC;color:#26215C}.btn-STYLE:hover{background:#CECBF6}
.btn-OTHER{background:#FAEEDA;border-color:#EF9F27;color:#412402}.btn-OTHER:hover{background:#FAC775}
.trou-btn.ok{background:#EAF3DE;border-color:#3B6D11;color:#173404}
.trou-btn.ko{background:#FCEBEB;border-color:#A32D2D;color:#501313}

.erreur-card{border-radius:16px;overflow:hidden;margin-bottom:1rem;border:2px solid}
.card-TYPOS{border-color:#5DCAA5}.card-GRAMMAR{border-color:#85B7EB}.card-STYLE{border-color:#AFA9EC}.card-OTHER{border-color:#EF9F27}
.card-header{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.header-TYPOS{background:#E1F5EE}.header-GRAMMAR{background:#E6F1FB}.header-STYLE{background:#EEEDFE}.header-OTHER{background:#FAEEDA}
.badge{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;font-family:'Baloo 2',var(--font-sans)}
.badge-TYPOS{background:#5DCAA5;color:#04342C}.badge-GRAMMAR{background:#85B7EB;color:#042C53}.badge-STYLE{background:#AFA9EC;color:#26215C}.badge-OTHER{background:#EF9F27;color:#412402}
.num-badge{font-size:12px;color:var(--color-text-secondary);font-weight:600}

/* ── RÈGLE EN VIOLET ── */
.lecon-zone{padding:16px 18px;border-bottom:1.5px solid #AFA9EC;background:#EEEDFE;border-top:1.5px solid #AFA9EC}
.lecon-titre{font-size:11px;font-weight:700;color:#534AB7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:'Baloo 2',var(--font-sans);display:flex;align-items:center;gap:6px}
.lecon-texte{font-size:15px;line-height:1.75;color:#26215C;font-weight:600}

.feedback-zone{padding:14px 18px;display:none;border-top:1.5px solid var(--color-border-tertiary)}
.feedback-zone.show{display:block}
.feedback-zone.good{background:#EAF3DE}.feedback-zone.bad{background:#FCEBEB}
.feedback-texte{font-size:15px;line-height:1.6;font-weight:600}
.feedback-texte.good{color:#173404}.feedback-texte.bad{color:#501313}

.nav-zone{padding:14px 18px;display:none;border-top:1.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.nav-zone.show{display:flex;justify-content:flex-end}
.btn-suiv{padding:11px 26px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#3B6D11;color:#fff;display:inline-flex;align-items:center;gap:8px;font-family:'Baloo 2',var(--font-sans)}
.btn-suiv:hover{background:#27500A}

.fin-card{background:#EAF3DE;border-radius:16px;padding:2.5rem;text-align:center;display:none;border:2px solid #97C459}
.fin-card.show{display:block}
.fin-score{font-size:56px;font-weight:700;color:#27500A;font-family:'Baloo 2',var(--font-sans)}
.fin-label{font-size:16px;color:#3B6D11;margin:8px 0 1.5rem;font-weight:600}
.btn-rec{padding:11px 26px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#3B6D11;color:#fff;display:inline-flex;align-items:center;gap:8px;font-family:'Baloo 2',var(--font-sans)}
.btn-rec:hover{background:#27500A}
.ok-box{background:#EAF3DE;border-radius:16px;padding:2rem;text-align:center;border:2px solid #97C459}
</style>

<h2 class="sr-only">Correcteur orthographique et grammatical interactif pour élèves</h2>
<div class="app">
  <div id="saisie">
    <h1><i class="ti ti-pencil" aria-hidden="true"></i> Mon correcteur</h1>
    <p class="sub">Écris ton texte — je t'aide à te corriger toi-même !</p>
    <div class="level-row">
      <span>Niveau :</span>
      <button class="lvl active" onclick="setLevel('cp')" id="l-cp">CP</button>
      <button class="lvl" onclick="setLevel('ce1')" id="l-ce1">CE1</button>
      <button class="lvl" onclick="setLevel('ce2')" id="l-ce2">CE2</button>
      <button class="lvl" onclick="setLevel('cm')" id="l-cm">CM1-CM2</button>
    </div>
    <textarea id="txt" placeholder="Écris ton texte ici…&#10;Exemple : Il a manger une pomme. les enfant joue dans le jardin."></textarea>
    <button class="btn-go" id="btnGo" onclick="lancer()">
      <i class="ti ti-search" aria-hidden="true"></i> Vérifier mon texte
    </button>
  </div>
  <div class="correction" id="correction"></div>
</div>

<script>
let level='cp', errors=[], idx=0, correct=0, answered=[], originalText='';

function setLevel(l){
  level=l;
  ['cp','ce1','ce2','cm'].forEach(x=>document.getElementById('l-'+x).classList.toggle('active',x===l));
}

const STYLES={
  TYPOS  :{card:'card-TYPOS',  header:'header-TYPOS',  btn:'btn-TYPOS',  badge:'badge-TYPOS',  label:'Orthographe'},
  GRAMMAR:{card:'card-GRAMMAR',header:'header-GRAMMAR',btn:'btn-GRAMMAR',badge:'badge-GRAMMAR',label:'Grammaire'},
  STYLE  :{card:'card-STYLE',  header:'header-STYLE',  btn:'btn-STYLE',  badge:'badge-STYLE',  label:'Style'},
  OTHER  :{card:'card-OTHER',  header:'header-OTHER',  btn:'btn-OTHER',  badge:'badge-OTHER',  label:'Autre'},
};
function sFor(cat){return STYLES[cat]||STYLES.OTHER;}

function buildPhraseCtx(eIdx){
  const e=errors[eIdx], text=originalText;
  let phraseStart=0, phraseEnd=text.length;
  for(let i=e.start;i>=0;i--){
    if(i===0){phraseStart=0;break;}
    if('.!?\n'.includes(text[i-1])){phraseStart=i;break;}
  }
  for(let i=e.start+e.len;i<text.length;i++){
    if('.!?\n'.includes(text[i])){phraseEnd=i+1;break;}
  }
  const before=text.slice(phraseStart,e.start);
  const after=text.slice(e.start+e.len,phraseEnd);
  const s=sFor(e.cat);
  const deja=answered[eIdx]!==null;
  let btnsHtml='';
  e.choix.forEach((c,ci)=>{
    let cls='trou-btn '+s.btn, ico='';
    if(deja){
      if(c===e.bonne){cls='trou-btn ok';ico='<i class="ti ti-circle-check" aria-hidden="true" style="font-size:16px;margin-right:4px"></i>';}
      else if(ci===answered[eIdx]){cls='trou-btn ko';ico='<i class="ti ti-x" aria-hidden="true" style="font-size:16px;margin-right:4px"></i>';}
      else cls='trou-btn grise';
    }
    btnsHtml+=`<button class="${cls}" id="tb-${eIdx}-${ci}" onclick="repondre(${eIdx},${ci})">${ico}${esc(c)}</button>`;
  });
  return `<div class="phrase-ctx">
    <span class="ctx-before">${esc(before)}</span><span class="trou-wrap">${btnsHtml}</span><span class="ctx-after">${esc(after)}</span>
  </div>`;
}

async function lancer(){
  const text=document.getElementById('txt').value.trim();
  if(!text)return;
  originalText=text;
  const btn=document.getElementById('btnGo');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Analyse en cours…';
  let ltMatches=[];
  try{
    const resp=await fetch('https://api.languagetool.org/v2/check',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({language:'fr',text})
    });
    const data=await resp.json();
    ltMatches=data.matches||[];
  }catch(e){
    btn.disabled=false;
    btn.innerHTML='<i class="ti ti-search" aria-hidden="true"></i> Vérifier mon texte';
    alert('Impossible de contacter le correcteur. Vérifie ta connexion.');
    return;
  }
  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-search" aria-hidden="true"></i> Vérifier mon texte';
  errors=[];
  for(const m of ltMatches){
    if(!m.replacements||m.replacements.length===0)continue;
    const word=originalText.slice(m.offset,m.offset+m.length);
    if(!word.trim())continue;
    const suggestions=m.replacements.slice(0,2).map(r=>r.value).filter(r=>r!==word);
    if(!suggestions.length)continue;
    const bonne=suggestions[0];
    const choix=[word,bonne];
    const issueType=m.rule&&m.rule.issueType;
    const cat={'misspelling':'TYPOS','grammar':'GRAMMAR','style':'STYLE'}[issueType]||'OTHER';
    let lecon=m.message||'';
    lecon=lecon.replace(/\(.*?\)/g,'').trim();
    if(lecon.length>200)lecon=lecon.slice(0,197)+'…';
    errors.push({cat,word,start:m.offset,len:m.length,choix,bonne,lecon});
  }
  errors=errors.slice(0,8);
  idx=0;correct=0;answered=new Array(errors.length).fill(null);
  document.getElementById('saisie').style.display='none';
  const corr=document.getElementById('correction');
  corr.style.display='block';
  corr.innerHTML=`
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
      <span class="progress-count" id="pcount">0 / ${errors.length}</span>
    </div>
    <div id="erreurCard"></div>
    <div class="fin-card" id="finCard">
      <div class="fin-score" id="finScore"></div>
      <div class="fin-label" id="finLabel"></div>
      <button class="btn-rec" onclick="recommencer()"><i class="ti ti-refresh" aria-hidden="true"></i> Nouveau texte</button>
    </div>`;
  if(!errors.length){
    document.getElementById('erreurCard').innerHTML=`<div class="ok-box">
      <i class="ti ti-circle-check" aria-hidden="true" style="color:#3B6D11;font-size:36px;display:block;margin:0 auto 10px"></i>
      <p style="color:#27500A;font-weight:700;font-size:17px;font-family:'Baloo 2',sans-serif">Bravo ! Aucune erreur trouvée.</p>
    </div>`;
  }else{
    afficherErreur(0);
  }
}

function afficherErreur(i){
  const e=errors[i], total=errors.length;
  const fait=answered.filter(x=>x!==null).length;
  document.getElementById('pfill').style.width=Math.round(fait/total*100)+'%';
  document.getElementById('pcount').textContent=fait+' / '+total;
  const s=sFor(e.cat);
  const deja=answered[i]!==null;
  let fbHtml='', navHtml='';
  if(deja){
    const wasOk=e.choix[answered[i]]===e.bonne;
    const msg=wasOk
      ?`<i class="ti ti-circle-check" aria-hidden="true"></i> <strong>Bravo !</strong> La bonne réponse est bien <strong>${esc(e.bonne)}</strong>.`
      :`<i class="ti ti-x" aria-hidden="true"></i> <strong>Pas tout à fait.</strong> La bonne réponse est <strong>${esc(e.bonne)}</strong>.`;
    fbHtml=`<div class="feedback-zone show ${wasOk?'good':'bad'}"><div class="feedback-texte ${wasOk?'good':'bad'}">${msg}</div></div>`;
    navHtml=`<div class="nav-zone show"><button class="btn-suiv" onclick="suivant()">
      <span>${i===total-1?'Voir mon bilan':'Erreur suivante'}</span>
      <i class="ti ti-arrow-right" aria-hidden="true"></i></button></div>`;
  }
  document.getElementById('erreurCard').innerHTML=`
    <div class="erreur-card ${s.card}">
      <div class="card-header ${s.header}">
        <span class="badge ${s.badge}">${s.label}</span>
        <span class="num-badge">Erreur ${i+1} sur ${total}</span>
      </div>
      ${buildPhraseCtx(i)}
      <div class="lecon-zone">
        <div class="lecon-titre"><i class="ti ti-bulb" aria-hidden="true"></i> La règle</div>
        <div class="lecon-texte">${esc(e.lecon)}</div>
      </div>
      ${fbHtml}${navHtml}
    </div>`;
}

function repondre(i,ci){
  if(answered[i]!==null)return;
  const e=errors[i];
  const isOk=e.choix[ci]===e.bonne;
  answered[i]=ci; if(isOk)correct++;
  e.choix.forEach((c,k)=>{
    const b=document.getElementById('tb-'+i+'-'+k); if(!b)return;
    if(c===e.bonne){b.className='trou-btn ok';b.innerHTML='<i class="ti ti-circle-check" aria-hidden="true" style="font-size:16px;margin-right:4px"></i>'+esc(c);}
    else if(k===ci){b.className='trou-btn ko';b.innerHTML='<i class="ti ti-x" aria-hidden="true" style="font-size:16px;margin-right:4px"></i>'+esc(c);}
    else b.className='trou-btn grise';
    b.style.pointerEvents='none';
  });
  const msg=isOk
    ?`<i class="ti ti-circle-check" aria-hidden="true"></i> <strong>Bravo !</strong> La bonne réponse est bien <strong>${esc(e.bonne)}</strong>.`
    :`<i class="ti ti-x" aria-hidden="true"></i> <strong>Pas tout à fait.</strong> La bonne réponse est <strong>${esc(e.bonne)}</strong>.`;
  const card=document.getElementById('erreurCard').querySelector('.erreur-card');
  const fb=document.createElement('div');
  fb.className=`feedback-zone show ${isOk?'good':'bad'}`;
  fb.innerHTML=`<div class="feedback-texte ${isOk?'good':'bad'}">${msg}</div>`;
  card.appendChild(fb);
  const nav=document.createElement('div');
  nav.className='nav-zone show';
  nav.innerHTML=`<button class="btn-suiv" onclick="suivant()">
    <span>${i===errors.length-1?'Voir mon bilan':'Erreur suivante'}</span>
    <i class="ti ti-arrow-right" aria-hidden="true"></i></button>`;
  card.appendChild(nav);
  const fait=answered.filter(x=>x!==null).length;
  document.getElementById('pfill').style.width=Math.round(fait/errors.length*100)+'%';
  document.getElementById('pcount').textContent=fait+' / '+errors.length;
}

function suivant(){
  if(idx===errors.length-1)afficherBilan();
  else{idx++;afficherErreur(idx);}
}

function afficherBilan(){
  document.getElementById('erreurCard').innerHTML='';
  const fin=document.getElementById('finCard');
  fin.className='fin-card show';
  const pct=Math.round(correct/errors.length*100);
  document.getElementById('finScore').textContent=correct+' / '+errors.length;
  document.getElementById('pfill').style.width='100%';
  document.getElementById('pcount').textContent=errors.length+' / '+errors.length;
  document.getElementById('finLabel').textContent=
    pct===100?'Parfait ! Toutes les erreurs corrigées !':
    pct>=80?'Très bien ! Continue comme ça.':
    pct>=60?'Pas mal ! Relis les leçons pour progresser.':
    'Continue à t\'entraîner, tu vas y arriver !';
}

function recommencer(){
  document.getElementById('correction').style.display='none';
  document.getElementById('saisie').style.display='block';
  document.getElementById('txt').value='';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
