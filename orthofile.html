<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mon correcteur</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f8f9fa;min-height:100vh;padding:1rem}
.app{max-width:680px;margin:0 auto;padding:1rem 0}
h1{font-size:22px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:4px;font-family:'Baloo 2',sans-serif}
.sub{font-size:14px;color:#666;text-align:center;margin-bottom:1rem}
.level-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.level-row span{font-size:12px;color:#888}
.lvl{padding:5px 14px;font-size:13px;font-weight:600;border:1.5px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;color:#666;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
.lvl.active{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.tab-btn{padding:8px 16px;font-size:14px;font-weight:600;border:1.5px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;color:#666;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent;transition:all .15s}
.tab-btn.active{background:#3B6D11;border-color:#3B6D11;color:#fff}
textarea{width:100%;min-height:120px;padding:12px;font-size:15px;line-height:1.7;border:1.5px solid #ccc;border-radius:12px;resize:vertical;font-family:'Nunito',sans-serif;color:#1a1a1a;background:#fff;-webkit-appearance:none}
textarea:focus{outline:none;border-color:#378ADD}
.btn-go{background:#3B6D11;border:none;color:#fff;font-size:16px;font-weight:700;padding:12px 24px;margin-top:10px;width:100%;cursor:pointer;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Baloo 2',sans-serif;transition:background .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-go:hover{background:#27500A}
.btn-go:disabled{background:#aaa;cursor:not-allowed}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.correction{display:none}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.progress-track{flex:1;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:#639922;border-radius:4px;transition:width 0.4s}
.progress-count{font-size:13px;font-weight:700;color:#1a1a1a;white-space:nowrap}
.phrase-ctx{font-size:17px;line-height:3.2;padding:18px 18px 14px;background:#f4f4f4;font-family:'Nunito',sans-serif;color:#1a1a1a}
.ctx-grey{color:#999}
.trou-wrap{display:inline-flex;flex-direction:column;align-items:stretch;vertical-align:middle;margin:0 4px;gap:6px}
.trou-btn{padding:7px 18px;font-size:17px;font-weight:700;border:2.5px solid;border-radius:10px;cursor:pointer;font-family:'Baloo 2',sans-serif;white-space:nowrap;transition:all .15s;line-height:1.3;text-align:center;min-width:80px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.trou-btn:active{transform:scale(0.97)}
.btn-TYPOS{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.btn-GRAMMAR{background:#E6F1FB;border-color:#85B7EB;color:#0C447C}
.btn-STYLE{background:#EEEDFE;border-color:#AFA9EC;color:#26215C}
.btn-OTHER{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.trou-btn.ok{background:#EAF3DE;border-color:#3B6D11;color:#173404;pointer-events:none}
.trou-btn.ko{background:#FCEBEB;border-color:#A32D2D;color:#501313;pointer-events:none}
.trou-btn.grise{opacity:.35;pointer-events:none}
.libre-row{display:flex;gap:5px;align-items:center}
.saisie-libre{font-size:16px;font-weight:700;font-family:'Baloo 2',sans-serif;padding:6px 10px;border:2.5px solid #AFA9EC;border-radius:10px;width:130px;background:#fff;color:#1a1a1a;text-align:center}
.saisie-libre:focus{outline:none;border-color:#7F77DD}
.btn-valider{background:#EEEDFE;border:2.5px solid #AFA9EC;color:#26215C;font-size:13px;font-weight:700;font-family:'Baloo 2',sans-serif;padding:6px 12px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-jnsp{background:#fff;border:2px dashed #ccc;color:#888;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;padding:6px 12px;border-radius:10px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.mot-jnsp{color:#bbb;font-weight:700;font-style:italic;background:#f0f0f0;padding:2px 8px;border-radius:6px;border:2px dashed #ddd}
.erreur-card{border-radius:16px;overflow:hidden;margin-bottom:1rem;border:2px solid}
.card-TYPOS{border-color:#5DCAA5}.card-GRAMMAR{border-color:#85B7EB}.card-STYLE{border-color:#AFA9EC}.card-OTHER{border-color:#EF9F27}
.card-header{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.header-TYPOS{background:#E1F5EE}.header-GRAMMAR{background:#E6F1FB}.header-STYLE{background:#EEEDFE}.header-OTHER{background:#FAEEDA}
.badge{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;font-family:'Baloo 2',sans-serif}
.badge-TYPOS{background:#5DCAA5;color:#04342C}.badge-GRAMMAR{background:#85B7EB;color:#042C53}.badge-STYLE{background:#AFA9EC;color:#26215C}.badge-OTHER{background:#EF9F27;color:#412402}
.num-badge{font-size:12px;color:#888;font-weight:600}
.lecon-zone{padding:16px 18px;border-bottom:1.5px solid #AFA9EC;background:#EEEDFE;border-top:1.5px solid #AFA9EC}
.lecon-titre{font-size:11px;font-weight:700;color:#534AB7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:'Baloo 2',sans-serif}
.lecon-texte{font-size:15px;line-height:1.75;color:#26215C;font-weight:600}
.feedback-zone{padding:14px 18px;display:none;border-top:1.5px solid #ddd}
.feedback-zone.show{display:block}
.feedback-zone.good{background:#EAF3DE}.feedback-zone.bad{background:#FCEBEB}.feedback-zone.skip{background:#f4f4f4}
.feedback-texte{font-size:15px;line-height:1.6;font-weight:600}
.feedback-texte.good{color:#173404}.feedback-texte.bad{color:#501313}.feedback-texte.skip{color:#666}
.nav-zone{padding:14px 18px;display:none;border-top:1.5px solid #ddd;background:#f4f4f4}
.nav-zone.show{display:flex;justify-content:flex-end}
.btn-suiv{padding:11px 26px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#3B6D11;color:#fff;display:inline-flex;align-items:center;gap:8px;font-family:'Baloo 2',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ok-box{background:#EAF3DE;border-radius:16px;padding:2rem;text-align:center;border:2px solid #97C459}
/* BILAN PLEIN ECRAN */
.bilan-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:1000;overflow-y:auto;flex-direction:column}
.bilan-screen.show{display:flex}
.bilan-header{background:#3B6D11;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.bilan-header h2{color:#fff;font-size:18px;font-weight:700;font-family:'Baloo 2',sans-serif;margin:0}
.bilan-score-badge{background:#fff;color:#3B6D11;font-size:15px;font-weight:700;padding:4px 14px;border-radius:20px;font-family:'Baloo 2',sans-serif}
.bilan-body{flex:1;padding:24px 20px 0;display:flex;flex-direction:column;gap:16px}
.bilan-label{font-size:13px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-family:'Baloo 2',sans-serif}
.bilan-phrase{font-size:22px;line-height:2.8;font-family:'Nunito',sans-serif;color:#1a1a1a;background:#f8f8f8;border-radius:14px;padding:20px 22px;border:1.5px solid #e0e0e0}
.mot-barre{text-decoration:line-through;color:#ccc;font-weight:700;font-size:20px}
.mot-vert{color:#2D7A1E;font-weight:700;font-size:26px}
.mot-jnsp-bilan{color:#bbb;font-weight:700;font-style:italic}
.fleche-corr{color:#97C459;font-weight:700;margin:0 3px;font-size:18px}
.bilan-legende{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#888}
.bilan-footer{padding:20px;border-top:1.5px solid #eee;background:#fafafa;flex-shrink:0;margin-top:20px}
.bilan-msg{text-align:center;font-size:16px;font-weight:700;color:#3B6D11;margin-bottom:16px;font-family:'Baloo 2',sans-serif}
.btn-nouveau{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#3B6D11;color:#fff;font-family:'Baloo 2',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation}
</style>
</head>
<body>
<div class="app">
  <div id="saisie">
    <h1>&#x270F;&#xFE0F; Mon correcteur</h1>
    <p class="sub">Ecris ton texte &mdash; je t&rsquo;aide &agrave; te corriger toi-m&ecirc;me&nbsp;!</p>
    <div class="level-row">
      <span>Niveau&nbsp;:</span>
      <button class="lvl active" id="l-cp" onclick="setLevel('cp')">CP</button>
      <button class="lvl" id="l-ce1" onclick="setLevel('ce1')">CE1</button>
      <button class="lvl" id="l-ce2" onclick="setLevel('ce2')">CE2</button>
      <button class="lvl" id="l-cm" onclick="setLevel('cm')">CM1-CM2</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="tab-btn active" id="tab-txt" onclick="switchTab('txt')">&#x2328;&#xFE0F; Taper le texte</button>
      <button class="tab-btn" id="tab-photo" onclick="switchTab('photo')">&#x1F4F7; Photo du texte</button>
    </div>
    <div id="panel-txt">
      <textarea id="txt" placeholder="Ecris ton texte ici...&#10;Exemple : je vé au chant cueillir des pommr."></textarea>
      <button class="btn-go" id="btnGo" onclick="lancer()">&#x1F50D; Verifier mon texte</button>
    </div>
    <div id="panel-photo" style="display:none">
      <div onclick="document.getElementById('fileInput').click()" style="border:2px dashed #ccc;border-radius:12px;padding:2rem;text-align:center;cursor:pointer;background:#fff">
        <div style="font-size:36px;margin-bottom:8px">&#x1F4F7;</div>
        <p style="font-size:15px;font-weight:600;color:#333;margin-bottom:4px">Appuie ici pour prendre une photo</p>
        <p style="font-size:13px;color:#888">ou choisir une image de ta galerie</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
      <img id="previewImg" style="max-width:100%;border-radius:10px;margin-top:12px;display:none" alt="">
      <p id="ocrStatus" style="display:none;margin-top:10px;font-size:14px;color:#666;text-align:center"></p>
      <button class="btn-go" id="btnPhoto" style="display:none;margin-top:10px" onclick="lancerPhoto()">&#x1F50D; Corriger ce texte</button>
    </div>
  </div>
  <div class="correction" id="correction"></div>
</div>

<div class="bilan-screen" id="bilanScreen">
  <div class="bilan-header">
    <h2>&#x1F4DD; Ma correction</h2>
    <span class="bilan-score-badge" id="bilanScoreBadge"></span>
  </div>
  <div class="bilan-body">
    <div>
      <div class="bilan-label">&#x270F;&#xFE0F; Ton texte avec les corrections</div>
      <div class="bilan-phrase" id="bilanPhrase"></div>
    </div>
    <div class="bilan-legende">
      <span><span style="text-decoration:line-through;color:#ccc;font-weight:700">mot</span> mal ecrit</span>
      <span><span style="color:#2D7A1E;font-weight:700;font-size:16px">mot</span> bonne orthographe</span>
      <span><span style="color:#bbb;font-style:italic">mot</span> non su</span>
    </div>
  </div>
  <div class="bilan-footer">
    <div class="bilan-msg" id="bilanMsg"></div>
    <button class="btn-nouveau" onclick="recommencer()">&#x270F;&#xFE0F; Nouveau texte</button>
  </div>
</div>

<script>
var level='cp', errors=[], idx=0, correct=0, answered=[], originalText='';
var photoBase64=null, photoMime='image/jpeg';

function setLevel(l){
  level=l;
  ['cp','ce1','ce2','cm'].forEach(function(x){
    document.getElementById('l-'+x).classList.toggle('active',x===l);
  });
}

function switchTab(t){
  document.getElementById('panel-txt').style.display=t==='txt'?'block':'none';
  document.getElementById('panel-photo').style.display=t==='photo'?'block':'none';
  document.getElementById('tab-txt').classList.toggle('active',t==='txt');
  document.getElementById('tab-photo').classList.toggle('active',t==='photo');
}

var STYLES={
  TYPOS  :{card:'card-TYPOS',  header:'header-TYPOS',  btn:'btn-TYPOS',  badge:'badge-TYPOS',  label:'Orthographe'},
  GRAMMAR:{card:'card-GRAMMAR',header:'header-GRAMMAR',btn:'btn-GRAMMAR',badge:'badge-GRAMMAR',label:'Grammaire'},
  STYLE  :{card:'card-STYLE',  header:'header-STYLE',  btn:'btn-STYLE',  badge:'badge-STYLE',  label:'Style'},
  OTHER  :{card:'card-OTHER',  header:'header-OTHER',  btn:'btn-OTHER',  badge:'badge-OTHER',  label:'Autre'}
};
function sFor(cat){return STYLES[cat]||STYLES.OTHER;}

var WS='(?<![a-zA-Z\u00C0-\u024F])';
var WE='(?![a-zA-Z\u00C0-\u024F])';
function W(p){return new RegExp(WS+'('+p+')'+WE,'gi');}

var PHONO=[
  {re:W('j[ee\u00e9]me'),  right:"j'aime", cat:'TYPOS',   lecon:"j'aime s'ecrit avec une apostrophe : j'aime le chocolat."},
  {re:W('jaime'),          right:"j'aime", cat:'TYPOS',   lecon:"j'aime s'ecrit avec une apostrophe entre j et aime."},
  {re:W('v\u00e9'),        right:'vais',   cat:'GRAMMAR', lecon:'je vais : conjugaison du verbe aller. On ecrit vais et non ve.'},
  {re:W('jai'),            right:"j'ai",   cat:'TYPOS',   lecon:"j'ai s'ecrit avec une apostrophe : j'ai mange."},
  {re:W('j\u00e9'),        right:"j'ai",   cat:'TYPOS',   lecon:"j'ai (verbe avoir) s'ecrit avec apostrophe."},
  {re:W('s\u00e9'),        right:"c'est",  cat:'TYPOS',   lecon:"c'est s'ecrit avec c apostrophe est."},
  {re:W('f\u00e9'),        right:'fait',   cat:'GRAMMAR', lecon:'fait (verbe faire) : avec ai et t muet. Il fait beau.'},
  {re:W('ch\u00e9'),       right:'chez',   cat:'TYPOS',   lecon:'chez : avec un z final muet. Je vais chez moi.'},
  {re:W('apr\u00e9'),      right:'apr\u00e8s', cat:'TYPOS', lecon:'apr\u00e8s : avec un \u00e8 et un s muet.'},
  {re:W('koi'),            right:'quoi',   cat:'TYPOS',   lecon:'quoi : avec qu. Quoi de neuf ?'},
  {re:W('kan[dt]?'),       right:'quand',  cat:'TYPOS',   lecon:'quand : avec qu, se termine par nd.'},
  {re:W('parseke'),        right:'parce que', cat:'TYPOS', lecon:'parce que : deux mots separes.'},
  {re:W('biensur'),        right:'bien s\u00fbr', cat:'TYPOS', lecon:'bien s\u00fbr : deux mots, accent sur le u.'},
  {re:W('pate'),           right:'p\u00e2te',  cat:'TYPOS', lecon:'p\u00e2te : accent circonflexe sur le a. De la p\u00e2te a modeler.'},
  {re:W('[bdt]\u00e2tes?'),right:'p\u00e2tes', cat:'TYPOS', lecon:'p\u00e2tes commence par p ! Ne pas confondre p, b, t et d.'},
  {re:W('p\u00e2[bds]es?'),right:'p\u00e2tes',cat:'TYPOS', lecon:'p\u00e2tes : avec un t. Le t et le d se ressemblent a l\'oreille.'},
  {re:W('[bdt]ain'),       right:'pain',   cat:'TYPOS',   lecon:'pain (a manger) commence par p. bain (eau) commence par b.'},
  {re:W('[bdt]ortes?'),    right:'porte',  cat:'TYPOS',   lecon:'porte commence par p. La porte de la maison.'},
  {re:W('[bdt]attes?'),    right:'pattes', cat:'TYPOS',   lecon:'pattes (pieds des animaux) commence par p.'},
  {re:W('[bdt]atte'),      right:'patte',  cat:'TYPOS',   lecon:'patte commence par p avec tt.'},
  {re:W('[td]oules?'),     right:'boules', cat:'TYPOS',   lecon:'boules commence par b.'},
  {re:W('[tp]ans'),        right:'dans',   cat:'TYPOS',   lecon:'dans commence par d.'},
  {re:W('[tb]ents?'),      right:'dents',  cat:'TYPOS',   lecon:'dents commence par d.'},
  {re:W('[tb]os'),         right:'dos',    cat:'TYPOS',   lecon:'dos commence par d.'},
  {re:W('bont'),           right:'pont',   cat:'TYPOS',   lecon:'pont commence par p.'},
  {re:W('chocolas?'),      right:'chocolat',cat:'TYPOS',  lecon:'chocolat se termine par t muet : du chocolat.'},
  {re:W('chocota[st]?'),   right:'chocolat',cat:'TYPOS',  lecon:'chocolat : ch-o-c-o-l-a-t. Le l vient avant le t !'},
  {re:W('chokola[st]?'),   right:'chocolat',cat:'TYPOS',  lecon:'chocolat avec ch (et non k).'},
  {re:W('gateau[x]?'),     right:'g\u00e2teau', cat:'TYPOS', lecon:'g\u00e2teau : accent circonflexe sur le a.'},
  {re:W('omme'),           right:'homme',  cat:'TYPOS',   lecon:'homme : avec un h muet au debut.'},
  {re:W('pommr'),          right:'pommes', cat:'TYPOS',   lecon:'pommes : avec deux m.'},
  {re:W('programm?e?'),    right:'programme',cat:'TYPOS', lecon:'programme : avec deux m.'},
  {re:W('jardan'),         right:'jardin', cat:'TYPOS',   lecon:'jardin : se termine par in.'},
  {re:W('lappin'),         right:'lapin',  cat:'TYPOS',   lecon:'lapin : avec un seul p.'},
  {re:W('garson'),         right:'gar\u00e7on', cat:'TYPOS', lecon:'gar\u00e7on : avec une cedille.'},
  {re:W('elifant'),        right:'\u00e9l\u00e9phant',cat:'TYPOS', lecon:'\u00e9l\u00e9phant : avec ph pour le son f.'},
  {re:W('giraffe'),        right:'girafe', cat:'TYPOS',   lecon:'girafe : avec un seul f.'},
  {re:W('ecole'),          right:'\u00e9cole', cat:'TYPOS', lecon:'\u00e9cole : commence par un e accentue.'},
  {re:W('balont'),         right:'ballon', cat:'TYPOS',   lecon:'ballon : avec ll, finit par on.'},
  {re:W('fanetre'),        right:'fen\u00eatre',cat:'TYPOS', lecon:'fen\u00eatre : accent circonflexe sur le e.'},
  {re:W('soley'),          right:'soleil', cat:'TYPOS',   lecon:'soleil : se termine par eil.'},
  {re:W('nuaje'),          right:'nuage',  cat:'TYPOS',   lecon:'nuage : avec ge.'},
  {re:W('fourmin'),        right:'fourmi', cat:'TYPOS',   lecon:'fourmi : se termine par mi sans n.'},
  {re:W('entant'),         right:'enfant', cat:'TYPOS',   lecon:'enfant : avec en et an.'},
  {re:W('argen'),          right:'argent', cat:'TYPOS',   lecon:'argent : se termine par t muet.'},
  {re:W('chato'),          right:'ch\u00e2teau',cat:'TYPOS', lecon:'ch\u00e2teau : accent circonflexe sur le a.'},
  {re:W('papion'),         right:'papillon',cat:'TYPOS',  lecon:'papillon : avec ill.'},
  {re:W('tanbour'),        right:'tambour',cat:'TYPOS',   lecon:'tambour : avec am devant le b.'}
];

function filtrerSuggestions(word,reps,maxN){
  maxN=maxN||2;
  return (reps||[]).map(function(r){return r.value;}).filter(function(s){
    if(!s||s===word)return false;
    var sC=s.replace(/['\u2019]/g,'');
    var wC=word.replace(/['\u2019]/g,'');
    if(sC.length>wC.length*4)return false;
    if(s.indexOf(' ')>=0&&s.indexOf("'")<0&&s.indexOf('\u2019')<0&&word.indexOf(' ')<0)return false;
    return true;
  }).slice(0,maxN);
}

function detecterPhono(text,dejaVus){
  var trouvees=[];
  for(var pi=0;pi<PHONO.length;pi++){
    var p=PHONO[pi];
    var re=new RegExp(p.re.source,p.re.flags);
    var m;
    while((m=re.exec(text))!==null){
      var key='phono|'+m.index;
      if(dejaVus[key])continue;
      dejaVus[key]=true;
      trouvees.push({cat:p.cat,word:m[0],start:m.index,len:m[0].length,
        choix:[m[0],p.right],bonne:p.right,lecon:p.lecon,libreVal:null});
    }
  }
  return trouvees;
}

function buildPhraseCtx(eIdx){
  var e=errors[eIdx],text=originalText;
  var ps=0,pe=text.length;
  for(var i=e.start;i>=0;i--){
    if(i===0){ps=0;break;}
    if('.!?\n'.indexOf(text[i-1])>=0){ps=i;break;}
  }
  for(var i=e.start+e.len;i<text.length;i++){
    if('.!?\n'.indexOf(text[i])>=0){pe=i+1;break;}
  }
  var before=text.slice(ps,e.start);
  var after=text.slice(e.start+e.len,pe);
  var s=sFor(e.cat);
  var st=answered[eIdx];
  if(st!==null){
    if(st==='jnsp')return '<div class="phrase-ctx"><span class="ctx-grey">'+esc(before)+'</span><span class="mot-jnsp">'+esc(e.word)+'</span><span class="ctx-grey">'+esc(after)+'</span></div>';
    if(st==='libre'){
      var ok=e.libreVal&&e.libreVal.trim().toLowerCase()===e.bonne.trim().toLowerCase();
      return '<div class="phrase-ctx"><span class="ctx-grey">'+esc(before)+'</span><span class="trou-btn '+(ok?'ok':'ko')+'" style="pointer-events:none;display:inline-block;vertical-align:middle;margin:0 4px">'+(ok?'OK ':'')+ esc(e.libreVal||'')+'</span><span class="ctx-grey">'+esc(after)+'</span></div>';
    }
    var btns='';
    for(var ci=0;ci<e.choix.length;ci++){
      var c=e.choix[ci];
      var cls='trou-btn '+(c===e.bonne?'ok':ci===st?'ko':'grise');
      var ico=c===e.bonne?'OK ':ci===st?'X ':'';
      btns+='<button class="'+cls+'">'+ico+esc(c)+'</button>';
    }
    return '<div class="phrase-ctx"><span class="ctx-grey">'+esc(before)+'</span><span class="trou-wrap">'+btns+'</span><span class="ctx-grey">'+esc(after)+'</span></div>';
  }
  var btns='';
  for(var ci=0;ci<e.choix.length;ci++){
    btns+='<button class="trou-btn '+s.btn+'" id="tb-'+eIdx+'-'+ci+'" onclick="repondre('+eIdx+','+ci+')">'+esc(e.choix[ci])+'</button>';
  }
  var libre='<div class="libre-row"><input class="saisie-libre" id="libre-'+eIdx+'" type="text" placeholder="Ecris ici..." onkeydown="if(event.key===\'Enter\')validerLibre('+eIdx+')"><button class="btn-valider" onclick="validerLibre('+eIdx+')">OK</button></div>';
  var jnsp='<button class="btn-jnsp" id="jnsp-'+eIdx+'" onclick="jnsp('+eIdx+')">? Je ne sais pas</button>';
  return '<div class="phrase-ctx"><span class="ctx-grey">'+esc(before)+'</span><span class="trou-wrap">'+btns+libre+jnsp+'</span><span class="ctx-grey">'+esc(after)+'</span></div>';
}

function lancer(){
  var text=document.getElementById('txt').value.trim();
  if(!text)return;
  originalText=text;
  var btn=document.getElementById('btnGo');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Analyse en cours...';
  fetch('https://api.languagetool.org/v2/check',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'language=fr&text='+encodeURIComponent(text)
  }).then(function(r){return r.json();}).then(function(data){
    traiterResultats(data.matches||[]);
  }).catch(function(){
    traiterResultats([]);
  }).finally(function(){
    btn.disabled=false;
    btn.innerHTML='&#x1F50D; Verifier mon texte';
  });
}

function traiterResultats(ltMatches){
  var dejaVus={};
  errors=[];
  var phonoErrors=detecterPhono(originalText,dejaVus);
  for(var i=0;i<phonoErrors.length;i++)errors.push(phonoErrors[i]);
  for(var i=0;i<ltMatches.length;i++){
    var m=ltMatches[i];
    var word=originalText.slice(m.offset,m.offset+m.length);
    if(!word.trim())continue;
    var chevauche=false;
    for(var j=0;j<errors.length;j++){
      if(m.offset<errors[j].start+errors[j].len&&m.offset+m.length>errors[j].start){chevauche=true;break;}
    }
    if(chevauche)continue;
    var key='lt|'+m.offset;
    if(dejaVus[key])continue;
    dejaVus[key]=true;
    var suggestions=filtrerSuggestions(word,m.replacements||[]);
    if(!suggestions.length)continue;
    var bonne=suggestions[0];
    if(bonne===word)continue;
    var choix=[word,bonne];
    if(suggestions[1])choix.push(suggestions[1]);
    var issueType=m.rule&&m.rule.issueType;
    var catMap={'misspelling':'TYPOS','grammar':'GRAMMAR','style':'STYLE'};
    var cat=catMap[issueType]||'OTHER';
    var lecon=(m.message||'').replace(/\(.*?\)/g,'').trim();
    if(lecon.length>200)lecon=lecon.slice(0,197)+'...';
    errors.push({cat:cat,word:word,start:m.offset,len:m.length,choix:choix,bonne:bonne,lecon:lecon,libreVal:null});
  }
  errors.sort(function(a,b){return a.start-b.start;});
  errors=errors.slice(0,8);
  idx=0;correct=0;answered=new Array(errors.length).fill(null);
  document.getElementById('saisie').style.display='none';
  var corr=document.getElementById('correction');
  corr.style.display='block';
  corr.innerHTML='<div class="progress-row"><div class="progress-track"><div class="progress-fill" id="pfill" style="width:0%"></div></div><span class="progress-count" id="pcount">0 / '+errors.length+'</span></div><div id="erreurCard"></div>';
  if(!errors.length){
    document.getElementById('erreurCard').innerHTML='<div class="ok-box"><p style="font-size:36px;margin-bottom:8px">OK</p><p style="color:#27500A;font-weight:700;font-size:17px;font-family:Baloo 2,sans-serif">Bravo ! Aucune erreur trouvee.</p><br><button class="btn-nouveau" style="margin:0 auto;width:auto;padding:12px 24px" onclick="recommencer()">Nouveau texte</button></div>';
  }else{
    afficherErreur(0);
  }
}

function afficherErreur(i){
  var e=errors[i],total=errors.length;
  var fait=answered.filter(function(x){return x!==null;}).length;
  document.getElementById('pfill').style.width=Math.round(fait/total*100)+'%';
  document.getElementById('pcount').textContent=fait+' / '+total;
  var s=sFor(e.cat);
  var st=answered[i];
  var deja=st!==null;
  var fbHtml='',navHtml='';
  if(deja){
    var msg='',cls='';
    if(st==='jnsp'){
      msg='La bonne reponse etait <strong>'+esc(e.bonne)+'</strong>. Retiens-la !';cls='skip';
    }else if(st==='libre'){
      var ok2=e.libreVal&&e.libreVal.trim().toLowerCase()===e.bonne.trim().toLowerCase();
      cls=ok2?'good':'bad';
      msg=ok2?'Bravo ! Tu as bien ecrit <strong>'+esc(e.bonne)+'</strong> !':'Pas tout a fait. La bonne reponse est <strong>'+esc(e.bonne)+'</strong>.';
    }else{
      var ok2=e.choix[st]===e.bonne;cls=ok2?'good':'bad';
      msg=ok2?'Bravo ! La bonne reponse est bien <strong>'+esc(e.bonne)+'</strong>.':'Pas tout a fait. La bonne reponse est <strong>'+esc(e.bonne)+'</strong>.';
    }
    fbHtml='<div class="feedback-zone show '+cls+'"><div class="feedback-texte '+cls+'">'+msg+'</div></div>';
    navHtml='<div class="nav-zone show"><button class="btn-suiv" onclick="suivant()">'+(i===total-1?'Voir ma correction':'Erreur suivante')+' &rarr;</button></div>';
  }
  document.getElementById('erreurCard').innerHTML='<div class="erreur-card '+s.card+'"><div class="card-header '+s.header+'"><span class="badge '+s.badge+'">'+s.label+'</span><span class="num-badge">Erreur '+(i+1)+' sur '+total+'</span></div>'+buildPhraseCtx(i)+'<div class="lecon-zone"><div class="lecon-titre">La regle</div><div class="lecon-texte">'+esc(e.lecon)+'</div></div>'+fbHtml+navHtml+'</div>';
}

function repondre(i,ci){
  if(answered[i]!==null)return;
  if(errors[i].choix[ci]===errors[i].bonne)correct++;
  answered[i]=ci;majProgres();afficherErreur(i);
}

function validerLibre(i){
  if(answered[i]!==null)return;
  var input=document.getElementById('libre-'+i);
  var val=input?input.value.trim():'';
  if(!val)return;
  errors[i].libreVal=val;
  answered[i]='libre';
  if(val.toLowerCase()===errors[i].bonne.trim().toLowerCase())correct++;
  majProgres();afficherErreur(i);
}

function jnsp(i){
  if(answered[i]!==null)return;
  answered[i]='jnsp';majProgres();afficherErreur(i);
}

function majProgres(){
  var fait=answered.filter(function(x){return x!==null;}).length;
  document.getElementById('pfill').style.width=Math.round(fait/errors.length*100)+'%';
  document.getElementById('pcount').textContent=fait+' / '+errors.length;
}

function suivant(){
  if(idx===errors.length-1)afficherBilan();
  else{idx++;afficherErreur(idx);}
}

function afficherBilan(){
  document.getElementById('pfill').style.width='100%';
  document.getElementById('pcount').textContent=errors.length+' / '+errors.length;
  var pct=errors.length>0?Math.round(correct/errors.length*100):100;
  var html='',pos=0;
  var sorted=errors.slice().sort(function(a,b){return a.start-b.start;});
  for(var ei=0;ei<sorted.length;ei++){
    var e=sorted[ei];
    if(e.start<pos)continue;
    if(e.start>pos)html+=esc(originalText.slice(pos,e.start));
    var raw=originalText.slice(e.start,e.start+e.len);
    var oi=errors.indexOf(e);
    var st=answered[oi];
    if(st===null||st==='jnsp'){
      html+='<span class="mot-jnsp-bilan">'+esc(raw)+'</span>';
    }else{
      var wasOk=(st==='libre')
        ?(e.libreVal&&e.libreVal.trim().toLowerCase()===e.bonne.trim().toLowerCase())
        :(e.choix[st]===e.bonne);
      if(wasOk){html+='<span class="mot-vert">'+esc(e.bonne)+'</span>';}
      else{html+='<span class="mot-barre">'+esc(raw)+'</span><span class="fleche-corr">&rarr;</span><span class="mot-vert">'+esc(e.bonne)+'</span>';}
    }
    pos=e.start+e.len;
  }
  if(pos<originalText.length)html+=esc(originalText.slice(pos));
  document.getElementById('bilanPhrase').innerHTML=html;
  document.getElementById('bilanScoreBadge').textContent=correct+' / '+errors.length;
  var msgs=[[100,'Parfait ! Toutes les corrections en vert !'],[80,'Tres bien ! Recopie les mots en vert.'],[60,'Pas mal ! Regarde bien les mots en vert.'],[0,'Recopie les mots en vert sur ta feuille.']];
  document.getElementById('bilanMsg').textContent=msgs.filter(function(m){return pct>=m[0];})[0][1];
  document.getElementById('correction').style.display='none';
  document.getElementById('bilanScreen').className='bilan-screen show';
}

function recommencer(){
  document.getElementById('correction').style.display='none';
  document.getElementById('bilanScreen').className='bilan-screen';
  document.getElementById('saisie').style.display='block';
  document.getElementById('txt').value='';
  photoBase64=null;
  document.getElementById('previewImg').style.display='none';
  var bp=document.getElementById('btnPhoto');if(bp){bp.style.display='none';}
  switchTab('txt');
}

function handlePhoto(e){
  var f=e.target.files[0];if(!f)return;
  photoMime=f.type||'image/jpeg';
  var r=new FileReader();
  r.onload=function(ev){
    var img=document.getElementById('previewImg');
    img.src=ev.target.result;img.style.display='block';
    photoBase64=ev.target.result.split(',')[1];
    document.getElementById('btnPhoto').style.display='flex';
  };
  r.readAsDataURL(f);
}

function lancerPhoto(){
  if(!photoBase64)return;
  var btn=document.getElementById('btnPhoto');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Chargement...';
  var status=document.getElementById('ocrStatus');
  status.style.display='block';
  status.textContent='Preparation du lecteur...';
  function doOCR(){
    status.textContent='Analyse de l\'image... (10-20 sec)';
    var imgSrc='data:'+photoMime+';base64,'+photoBase64;
    Tesseract.recognize(imgSrc,'fra',{
      logger:function(m){
        if(m.status==='recognizing text'){
          status.textContent='Lecture... '+Math.round((m.progress||0)*100)+'%';
        }
      }
    }).then(function(result){
      var texte=(result.data.text||'').trim();
      texte=texte.replace(/\n{3,}/g,'\n').replace(/^\s+|\s+$/mg,'').trim();
      if(!texte||texte.length<3){
        status.textContent='Impossible de lire. Essaie avec une image plus nette.';
        btn.disabled=false;btn.innerHTML='Corriger ce texte';return;
      }
      status.textContent='Lu : "'+texte.slice(0,60)+(texte.length>60?'...':'')+'"';
      document.getElementById('txt').value=texte;
      switchTab('txt');
      lancer();
    }).catch(function(err){
      status.textContent='Erreur : '+(err.message||'image illisible.');
      btn.disabled=false;btn.innerHTML='Corriger ce texte';
    });
  }
  if(typeof Tesseract!=='undefined'){
    btn.innerHTML='<span class="spinner"></span> Lecture en cours...';
    doOCR();
  }else{
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js';
    s.onload=function(){btn.innerHTML='<span class="spinner"></span> Lecture en cours...';doOCR();};
    s.onerror=function(){status.textContent='Impossible de charger le lecteur. Verifie ta connexion.';btn.disabled=false;btn.innerHTML='Corriger ce texte';};
    document.head.appendChild(s);
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
